<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produit — Mus Tech</title>
    <script src="api.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap");
      :root {
        --green: #3ecf6e;
        --green-light: #d4f7e2;
        --green-dark: #1fad52;
        --white: #ffffff;
        --gray-50: #f4f4f5;
        --gray-100: #e8e8ea;
        --gray-300: #b0b0b8;
        --gray-500: #6b6b78;
        --gray-700: #2e2e38;
        --gray-900: #111118;
        --shadow-md: 0 6px 24px rgba(0, 0, 0, 0.09);
        --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Outfit", system-ui, sans-serif;
        background: var(--white);
        color: var(--gray-900);
        min-height: 100vh;
      }

      nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--gray-100);
        padding: 0 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 64px;
      }
      .nav-logo {
        font-size: 1.2rem;
        font-weight: 900;
        color: var(--gray-900);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .dot {
        width: 8px;
        height: 8px;
        background: var(--green);
        border-radius: 50%;
        display: inline-block;
      }
      .back-btn {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--gray-50);
        border: 1.5px solid var(--gray-100);
        border-radius: 50px;
        padding: 0.4rem 1.1rem;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--gray-700);
        text-decoration: none;
      }
      .back-btn:hover {
        background: var(--gray-100);
      }

      .page {
        max-width: 900px;
        margin: 3rem auto;
        padding: 0 1.5rem;
      }
      .card {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 3rem;
        background: var(--white);
        border-radius: 20px;
        box-shadow: var(--shadow-md);
        padding: 2.5rem;
      }
      @media (max-width: 640px) {
        .card {
          grid-template-columns: 1fr;
          gap: 1.5rem;
          padding: 1.5rem;
        }
      }

      .img-wrap {
        background: linear-gradient(135deg, var(--gray-50), var(--green-light));
        border-radius: 16px;
        width: 100%;
        aspect-ratio: 1/1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 6rem;
        position: relative;
        margin-bottom: 0.75rem;
        overflow: hidden;
      }
      .img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        padding: 1.5rem;
      }
      .badge-img {
        position: absolute;
        top: 14px;
        left: 14px;
        background: var(--green);
        color: #fff;
        font-size: 0.72rem;
        font-weight: 700;
        padding: 0.25rem 0.7rem;
        border-radius: 50px;
      }
      .thumbs {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      .thumb {
        width: 56px;
        height: 56px;
        object-fit: cover;
        border-radius: 8px;
        cursor: pointer;
        border: 2px solid transparent;
        transition: 0.2s;
      }
      .thumb.active {
        border-color: var(--green);
      }

      .info {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .cat {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--green-dark);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .pname {
        font-size: 1.6rem;
        font-weight: 900;
        line-height: 1.2;
      }
      .desc {
        font-size: 0.9rem;
        color: var(--gray-500);
        line-height: 1.7;
      }
      .pstock {
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--green-dark);
      }

      /* VARIANT SELECTOR WITH QTY */
      .vlabel {
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--gray-700);
        margin-bottom: 0.5rem;
      }
      .variant-rows {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .variant-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.6rem 0.9rem;
        border: 2px solid var(--gray-100);
        border-radius: 12px;
        background: var(--white);
        transition: var(--transition);
      }
      .variant-row.selected {
        border-color: var(--green);
        background: var(--green-light);
      }
      .variant-name {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--gray-700);
        flex: 1;
      }
      .variant-row.selected .variant-name {
        color: var(--green-dark);
      }
      .variant-price {
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--gray-500);
        margin-right: 0.75rem;
      }
      .variant-row.selected .variant-price {
        color: var(--green-dark);
      }
      .qty-ctrl {
        display: flex;
        align-items: center;
        border: 1.5px solid var(--gray-200);
        border-radius: 50px;
        overflow: hidden;
        background: white;
      }
      .qbtn {
        width: 28px;
        height: 28px;
        border: none;
        background: transparent;
        font-size: 1rem;
        cursor: pointer;
        color: var(--gray-700);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .qbtn:hover {
        background: var(--gray-50);
      }
      .qval {
        width: 28px;
        text-align: center;
        font-weight: 700;
        font-size: 0.85rem;
      }

      /* TOTAL */
      .total-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem 1rem;
        background: var(--gray-50);
        border-radius: 10px;
      }
      .total-label {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--gray-500);
      }
      .total-amount {
        font-size: 1.4rem;
        font-weight: 900;
        color: var(--gray-900);
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }
      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        border: none;
        border-radius: 50px;
        padding: 0.75rem 1.5rem;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        transition: var(--transition);
        width: 100%;
      }
      .btn-primary {
        background: var(--green);
        color: #fff;
        box-shadow: 0 4px 14px rgba(62, 207, 110, 0.35);
      }
      .btn-primary:hover {
        background: var(--green-dark);
        transform: translateY(-1px);
      }
      .btn-ghost {
        background: var(--gray-50);
        color: var(--gray-700);
        border: 1.5px solid var(--gray-100);
      }
      .btn-ghost:hover {
        background: var(--gray-100);
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }
      .share-row {
        display: flex;
        gap: 0.5rem;
      }
      .sbtn {
        background: var(--gray-50);
        color: var(--gray-700);
        border: 1.5px solid var(--gray-100);
        font-size: 0.82rem;
        padding: 0.4rem 1rem;
        border-radius: 50px;
        cursor: pointer;
        flex: 1;
      }
      .sbtn:hover {
        background: var(--gray-100);
      }

      /* CHECKOUT MODAL */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 200;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .overlay.open {
        display: flex;
      }
      .modal {
        background: var(--white);
        border-radius: 20px;
        width: 100%;
        max-width: 500px;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      }
      .mhead {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid var(--gray-100);
      }
      .mhead h3 {
        font-size: 1.1rem;
        font-weight: 800;
      }
      .mclose {
        background: none;
        border: none;
        font-size: 1.4rem;
        cursor: pointer;
        color: var(--gray-500);
        line-height: 1;
      }
      .mbody {
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .order-summary {
        background: var(--gray-50);
        border-radius: 12px;
        padding: 1rem;
      }
      .order-row {
        display: flex;
        justify-content: space-between;
        font-size: 0.9rem;
        padding: 0.3rem 0;
      }
      .order-row.total {
        font-weight: 800;
        font-size: 1rem;
        border-top: 1px solid var(--gray-100);
        margin-top: 0.5rem;
        padding-top: 0.75rem;
      }
      .fgroup {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }
      .fgroup label {
        font-size: 0.82rem;
        font-weight: 700;
        color: var(--gray-700);
      }
      .fgroup input,
      .fgroup select,
      .fgroup textarea {
        padding: 0.65rem 0.9rem;
        border: 1.5px solid var(--gray-100);
        border-radius: 10px;
        font-size: 0.9rem;
        font-family: inherit;
        width: 100%;
        outline: none;
      }
      .fgroup input:focus,
      .fgroup select:focus {
        border-color: var(--green);
      }
      .frow {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }
      .mfoot {
        padding: 1.25rem 1.5rem;
        border-top: 1px solid var(--gray-100);
      }

      .loading {
        text-align: center;
        padding: 5rem 2rem;
        color: var(--gray-500);
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--gray-100);
        border-top-color: var(--green);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        background: var(--gray-900);
        color: #fff;
        padding: 0.75rem 1.5rem;
        border-radius: 50px;
        font-size: 0.9rem;
        font-weight: 600;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 9999;
        white-space: nowrap;
      }
      .toast.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/" class="nav-logo"
        >M<span class="dot"></span>T &nbsp;Mus Tech</a
      >
      <a href="/" class="back-btn">← Retour à la boutique</a>
    </nav>

    <div class="page" id="page">
      <div class="loading">
        <div class="spinner"></div>
        Chargement...
      </div>
    </div>

    <!-- CHECKOUT MODAL -->
    <div class="overlay" id="checkout-overlay">
      <div class="modal">
        <div class="mhead">
          <h3>🧾 Commander</h3>
          <button class="mclose" onclick="closeCheckout()">✕</button>
        </div>
        <div class="mbody">
          <div class="order-summary" id="order-summary"></div>
          <div class="frow">
            <div class="fgroup">
              <label>Nom complet *</label
              ><input id="co-name" placeholder="Votre nom" />
            </div>
            <div class="fgroup">
              <label>Téléphone *</label
              ><input id="co-phone" placeholder="06xxxxxxxx" />
            </div>
          </div>
          <div class="fgroup">
            <label>Wilaya *</label>
            <select id="co-wilaya">
              <option value="">-- Choisir --</option>
            </select>
          </div>
          <div class="fgroup">
            <label>Adresse *</label
            ><input id="co-address" placeholder="Rue, quartier..." />
          </div>
          <div class="fgroup">
            <label>Note (optionnel)</label
            ><textarea
              id="co-note"
              rows="2"
              placeholder="Instructions spéciales..."></textarea>
          </div>
        </div>
        <div class="mfoot">
          <button class="btn btn-primary" onclick="placeOrder()">
            ✅ Confirmer la Commande
          </button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      let product = null;
      let WILAYAS = [];

      // variantQtys: { variantIndex: qty } — 0 means not selected
      let variantQtys = {};

      const WILAYAS_58 = [
        "Adrar",
        "Chlef",
        "Laghouat",
        "Oum El Bouaghi",
        "Batna",
        "Béjaïa",
        "Biskra",
        "Béchar",
        "Blida",
        "Bouira",
        "Tamanrasset",
        "Tébessa",
        "Tlemcen",
        "Tiaret",
        "Tizi Ouzou",
        "Alger",
        "Djelfa",
        "Jijel",
        "Sétif",
        "Saïda",
        "Skikda",
        "Sidi Bel Abbès",
        "Annaba",
        "Guelma",
        "Constantine",
        "Médéa",
        "Mostaganem",
        "Msila",
        "Mascara",
        "Ouargla",
        "Oran",
        "El Bayadh",
        "Illizi",
        "Bordj Bou Arréridj",
        "Boumerdès",
        "El Tarf",
        "Tindouf",
        "Tissemsilt",
        "El Oued",
        "Khenchela",
        "Souk Ahras",
        "Tipaza",
        "Mila",
        "Aïn Defla",
        "Naâma",
        "Aïn Témouchent",
        "Ghardaïa",
        "Relizane",
        "Timimoun",
        "Bordj Badji Mokhtar",
        "Ouled Djellal",
        "Béni Abbès",
        "In Salah",
        "In Guezzam",
        "Touggourt",
        "Djanet",
        "El Mghair",
        "El Meniaa",
      ];

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2500);
      }

      function switchImage(el, src) {
        document.getElementById("main-img").src = src;
        document
          .querySelectorAll(".thumb")
          .forEach((t) => t.classList.remove("active"));
        el.classList.add("active");
      }

      // ── VARIANT QTY LOGIC ───────────────────────────────────
      function changeVariantQty(index, delta) {
        const current = variantQtys[index] || 0;
        const newVal = Math.max(0, current + delta);
        variantQtys[index] = newVal;

        // Update display
        document.getElementById("vqty-" + index).textContent = newVal;
        const row = document.getElementById("vrow-" + index);
        row.classList.toggle("selected", newVal > 0);

        updateTotal();
      }

      function getTotal() {
        if (!product) return 0;
        return Object.entries(variantQtys).reduce((sum, [i, qty]) => {
          const price =
            product.variantPrices[parseInt(i)] ?? product.variantPrices[0];
          return sum + price * qty;
        }, 0);
      }

      function getTotalQty() {
        return Object.values(variantQtys).reduce((s, q) => s + q, 0);
      }

      function updateTotal() {
        const total = getTotal();
        const qty = getTotalQty();
        const el = document.getElementById("total-amount");
        if (el) el.textContent = total.toLocaleString() + " DA";
        const subEl = document.getElementById("total-qty");
        if (subEl)
          subEl.textContent =
            qty > 0 ? qty + " article(s)" : "Sélectionnez une option";
      }

      // ── CHECKOUT ────────────────────────────────────────────
      function openCheckout() {
        if (!product) return;
        if (getTotalQty() === 0) {
          showToast("Choisissez au moins une option !");
          return;
        }

        const productTotal = getTotal();

        // Build summary rows
        let rows = "";
        Object.entries(variantQtys).forEach(([i, qty]) => {
          if (qty === 0) return;
          const idx = parseInt(i);
          const variant = product.variants[idx] || "Standard";
          const price = product.variantPrices[idx] ?? product.variantPrices[0];
          rows += `<div class="order-row"><span>${product.name} — ${variant} ×${qty}</span><span>${(price * qty).toLocaleString()} DA</span></div>`;
        });

        document.getElementById("order-summary").innerHTML = `
          ${rows}
          <div class="order-row"><span>Livraison</span><span id="shipping-display">Choisir wilaya</span></div>
          <div class="order-row total"><span>Total</span><span id="total-display">${productTotal.toLocaleString()} DA</span></div>
        `;

        // Populate wilayas
        const sel = document.getElementById("co-wilaya");
        sel.innerHTML = '<option value="">-- Choisir --</option>';
        if (WILAYAS && WILAYAS.length > 0) {
          WILAYAS.forEach((w) => {
            const o = document.createElement("option");
            const price = w.shipping_price ?? w.price ?? 0;
            o.value = price;
            o.dataset.name = w.name;
            o.textContent = w.name + " — " + price + " DA";
            sel.appendChild(o);
          });
        } else {
          WILAYAS_58.forEach((name) => {
            const o = document.createElement("option");
            o.value = 0;
            o.dataset.name = name;
            o.textContent = name;
            sel.appendChild(o);
          });
        }

        sel.onchange = function () {
          const shipping = parseInt(this.value) || 0;
          const name = this.options[this.selectedIndex]?.dataset.name || "";
          document.getElementById("shipping-display").textContent = shipping
            ? name + " — " + shipping + " DA"
            : name || "Choisir wilaya";
          document.getElementById("total-display").textContent =
            (productTotal + shipping).toLocaleString() + " DA";
        };

        document.getElementById("checkout-overlay").classList.add("open");
      }

      function closeCheckout() {
        document.getElementById("checkout-overlay").classList.remove("open");
      }

      async function placeOrder() {
        const name = document.getElementById("co-name").value.trim();
        const phone = document.getElementById("co-phone").value.trim();
        const wilayaEl = document.getElementById("co-wilaya");
        const wilaya =
          wilayaEl.options[wilayaEl.selectedIndex]?.dataset.name ||
          wilayaEl.options[wilayaEl.selectedIndex]?.text ||
          "";
        const shipping = parseInt(wilayaEl.value) || 0;
        const address = document.getElementById("co-address").value.trim();
        const note = document.getElementById("co-note").value.trim();

        if (!name || !phone || !wilaya || !address) {
          showToast("Veuillez remplir tous les champs *");
          return;
        }

        // Build items array (one per variant selected)
        const items = [];
        Object.entries(variantQtys).forEach(([i, qty]) => {
          if (qty === 0) return;
          const idx = parseInt(i);
          items.push({
            product_id: product.id,
            product_name: product.name,
            variant: product.variants[idx] || "Standard",
            quantity: qty,
            unit_price: product.variantPrices[idx] ?? product.variantPrices[0],
          });
        });

        const orderData = {
          customer_name: name,
          customer: name,
          phone,
          wilaya,
          address,
          note,
          shipping_price: shipping,
          total: getTotal() + shipping,
          items,
        };

        try {
          await OrdersAPI.place(orderData);
          closeCheckout();
          document.getElementById("page").innerHTML += `
            <div style="text-align:center;padding:3rem;background:var(--green-light);border-radius:16px;margin-top:2rem;">
              <div style="font-size:3rem;margin-bottom:1rem;">✅</div>
              <h2 style="color:var(--green-dark);">Commande confirmée !</h2>
              <p style="color:var(--gray-700);margin-top:0.5rem;">Merci ${name}, nous vous contacterons au ${phone}.</p>
              <a href="/" style="display:inline-block;margin-top:1.5rem;padding:0.75rem 2rem;background:var(--green);color:#fff;border-radius:50px;font-weight:700;text-decoration:none;">Retour à la boutique</a>
            </div>`;
        } catch (e) {
          showToast(
            "Erreur: " + (e.message || "impossible de passer la commande"),
          );
        }
      }

      // ── RENDER ──────────────────────────────────────────────
      function renderProduct(p) {
        const images =
          p.images && p.images.length > 0 ? p.images : p.img ? [p.img] : [];
        const outOfStock = p.stock === 0;

        const mainImgHTML =
          images.length > 0
            ? `<img src="${images[0]}" id="main-img" style="width:100%;height:100%;object-fit:contain;padding:1.5rem;" />`
            : `<span>${p.icon || "🎮"}</span>`;

        const thumbsHTML =
          images.length > 1
            ? images
                .map(
                  (src, i) =>
                    `<img class="thumb ${i === 0 ? "active" : ""}" src="${src}" onclick="switchImage(this,'${src}')" />`,
                )
                .join("")
            : "";

        const badgeHTML = p.badge
          ? `<div class="badge-img">${p.badge}</div>`
          : "";

        // Build variant rows — each with its own +/- qty control
        const variantRowsHTML = p.variants
          .map((v, i) => {
            const price = p.variantPrices[i] ?? p.variantPrices[0];
            return `
            <div class="variant-row" id="vrow-${i}">
              <span class="variant-name">${v}</span>
              <span class="variant-price">${price.toLocaleString()} DA</span>
              <div class="qty-ctrl">
                <button class="qbtn" onclick="changeVariantQty(${i}, -1)">−</button>
                <span class="qval" id="vqty-${i}">0</span>
                <button class="qbtn" onclick="changeVariantQty(${i}, 1)">+</button>
              </div>
            </div>`;
          })
          .join("");

        const stockText =
          p.stock > 10
            ? `En stock (${p.stock})`
            : p.stock > 0
              ? `Stock limité (${p.stock})`
              : "Rupture de stock";
        const oldPriceHTML = p.oldPrice
          ? `<span style="font-size:0.9rem;color:var(--gray-300);text-decoration:line-through;">${p.oldPrice.toLocaleString()} DA</span>`
          : "";

        document.title = p.name + " — Mus Tech";
        document.getElementById("page").innerHTML = `
          <div class="card">
            <div>
              <div class="img-wrap">${badgeHTML}${mainImgHTML}</div>
              <div class="thumbs">${thumbsHTML}</div>
            </div>
            <div class="info">
              <div class="cat">${p.cat}</div>
              <div class="pname">${p.name}</div>
              ${p.description ? `<div class="desc">${p.description}</div>` : ""}
              <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
                ${oldPriceHTML}
                <span class="pstock">${stockText}</span>
              </div>

              <div>
                <div class="vlabel">Choisissez vos options et quantités :</div>
                <div class="variant-rows">${variantRowsHTML}</div>
              </div>

              <div class="total-row">
                <div>
                  <div class="total-label" id="total-qty">Sélectionnez une option</div>
                  <div class="total-amount" id="total-amount">0 DA</div>
                </div>
                <div style="font-size:0.75rem;color:var(--gray-300);text-align:right;">+ livraison</div>
              </div>

              <div class="actions">
                <button class="btn btn-primary" onclick="openCheckout()" ${outOfStock ? "disabled" : ""}>⚡ Acheter Maintenant</button>
                <div class="share-row">
                  <button class="sbtn" onclick="copyLink()">🔗 Copier le lien</button>
                  <button class="sbtn" onclick="shareProduct()">📤 Partager</button>
                </div>
              </div>
            </div>
          </div>`;
      }

      function copyLink() {
        navigator.clipboard
          .writeText(window.location.href)
          .then(() => showToast("Lien copié !"))
          .catch(() => prompt("Copiez ce lien:", window.location.href));
      }
      function shareProduct() {
        if (navigator.share && product)
          navigator.share({ title: product.name, url: window.location.href });
        else copyLink();
      }

      // ── LOAD ────────────────────────────────────────────────
      async function init() {
        const id = parseInt(
          new URLSearchParams(window.location.search).get("id"),
        );
        if (!id) {
          document.getElementById("page").innerHTML =
            '<div class="loading">Produit introuvable. <a href="/">Retour</a></div>';
          return;
        }
        try {
          const [p, wilayas] = await Promise.all([
            ProductsAPI.getOne(id),
            WilayasAPI.getAll(),
          ]);
          WILAYAS = wilayas || [];
          product = p;
          if (!product.variants || !product.variants.length)
            product.variants = ["Standard"];
          if (!product.variantPrices || !product.variantPrices.length)
            product.variantPrices = [product.price];
          if (typeof product.variants === "string")
            product.variants = JSON.parse(product.variants);
          if (typeof product.variantPrices === "string")
            product.variantPrices = JSON.parse(product.variantPrices);
          if (typeof product.images === "string")
            product.images = JSON.parse(product.images);
          // Init variantQtys to 0 for each variant
          variantQtys = {};
          product.variants.forEach((_, i) => (variantQtys[i] = 0));
          renderProduct(product);
        } catch (e) {
          document.getElementById("page").innerHTML =
            '<div class="loading">Impossible de charger ce produit. <a href="/">Retour</a></div>';
        }
      }

      init();
    </script>
  </body>
</html>
