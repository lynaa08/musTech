<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produit — Mus Tech</title>
    <script src="api.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap");
      :root {
        --green: #3ecf6e;
        --green-light: #d4f7e2;
        --green-dark: #1fad52;
        --white: #ffffff;
        --gray-50: #f4f4f5;
        --gray-100: #e8e8ea;
        --gray-300: #b0b0b8;
        --gray-500: #6b6b78;
        --gray-700: #2e2e38;
        --gray-900: #111118;
        --shadow-md: 0 6px 24px rgba(0, 0, 0, 0.09);
        --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.12);
        --radius: 14px;
        --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Outfit", system-ui, sans-serif;
        background: #f8fdf9;
        color: var(--gray-900);
        min-height: 100vh;
      }

      nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--gray-100);
        padding: 0 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 64px;
      }
      .nav-logo {
        font-size: 1.2rem;
        font-weight: 900;
        color: var(--gray-900);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .dot {
        width: 8px;
        height: 8px;
        background: var(--green);
        border-radius: 50%;
        display: inline-block;
      }
      .back-btn {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--gray-50);
        border: 1.5px solid var(--gray-100);
        border-radius: 50px;
        padding: 0.4rem 1.1rem;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--gray-700);
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s;
      }
      .back-btn:hover {
        background: var(--gray-100);
      }

      .page {
        max-width: 1100px;
        margin: 2.5rem auto;
        padding: 0 1.25rem;
      }

      /* CARD — two-column layout */
      .card {
        background: #fff;
        border-radius: 20px;
        box-shadow: var(--shadow-md);
        overflow: hidden;
        display: grid;
        grid-template-columns: 420px 1fr;
        min-height: 560px;
      }

      /* LEFT: IMAGE SECTION */
      .img-section {
        background: linear-gradient(135deg, var(--gray-50), var(--green-light));
        position: relative;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-right: 1px solid var(--gray-100);
      }
      .img-wrap {
        width: 100%;
        max-width: 340px;
        aspect-ratio: 1/1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 7rem;
        position: relative;
        border-radius: 16px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.6);
      }
      .img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        padding: 1.25rem;
      }
      .badge {
        position: absolute;
        top: 12px;
        left: 12px;
        background: var(--green);
        color: #fff;
        font-size: 0.72rem;
        font-weight: 700;
        padding: 0.25rem 0.7rem;
        border-radius: 50px;
        z-index: 2;
      }
      .badge.sale {
        background: #ff4b6e;
      }
      .thumbs {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 1rem;
        justify-content: center;
      }
      .thumb {
        width: 54px;
        height: 54px;
        object-fit: cover;
        border-radius: 8px;
        cursor: pointer;
        border: 2px solid transparent;
        transition: 0.2s;
        background: #fff;
      }
      .thumb.active {
        border-color: var(--green);
      }

      /* RIGHT: INFO SECTION */
      .info {
        padding: 2rem 2rem 2rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        overflow-y: auto;
      }
      .cat {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--green-dark);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 0.35rem;
      }
      .pname {
        font-size: 1.7rem;
        font-weight: 900;
        line-height: 1.2;
        margin-bottom: 0.6rem;
      }
      .desc {
        font-size: 0.9rem;
        color: var(--gray-500);
        line-height: 1.7;
        margin-bottom: 1.25rem;
      }
      .stock-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--green-dark);
        background: var(--green-light);
        padding: 0.3rem 0.8rem;
        border-radius: 50px;
        margin-bottom: 1.25rem;
      }
      .stock-badge.low {
        color: #d97706;
        background: #fff8e6;
      }
      .stock-badge.out {
        color: #dc2626;
        background: #fee2e2;
      }

      /* VARIANTS */
      .vlabel {
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--gray-700);
        margin-bottom: 0.5rem;
      }
      .variants {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-bottom: 1.25rem;
      }
      .vchip {
        padding: 0.4rem 1rem;
        border-radius: 50px;
        border: 2px solid var(--gray-100);
        background: #fff;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        color: var(--gray-700);
        transition: var(--transition);
      }
      .vchip.active {
        background: var(--green);
        border-color: var(--green);
        color: #fff;
      }

      /* PRICE */
      .price-row {
        display: flex;
        align-items: baseline;
        gap: 0.6rem;
        margin-bottom: 1.25rem;
      }
      .pmain {
        font-size: 2.2rem;
        font-weight: 900;
        color: var(--gray-900);
      }
      .pold {
        font-size: 1rem;
        color: var(--gray-300);
        text-decoration: line-through;
      }
      .pdiscount {
        font-size: 0.8rem;
        font-weight: 700;
        color: #ff4b6e;
        background: #fee2e2;
        padding: 0.2rem 0.6rem;
        border-radius: 50px;
      }

      /* QTY */
      .qty-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
      }
      .qlabel {
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--gray-700);
      }
      .qctrl {
        display: flex;
        align-items: center;
        border: 1.5px solid var(--gray-100);
        border-radius: 50px;
        overflow: hidden;
        background: #fff;
      }
      .qbtn {
        width: 38px;
        height: 38px;
        border: none;
        background: transparent;
        font-size: 1.2rem;
        cursor: pointer;
        color: var(--gray-700);
        transition: background 0.15s;
      }
      .qbtn:hover {
        background: var(--gray-50);
      }
      .qval {
        width: 36px;
        text-align: center;
        font-weight: 700;
        font-size: 0.95rem;
      }
      .qtotal {
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--green-dark);
      }

      /* CHECKOUT FORM */
      .checkout-form {
        background: var(--gray-50);
        border-radius: 14px;
        padding: 1.5rem;
        margin-bottom: 1.25rem;
        display: none;
      }
      .checkout-form.open {
        display: block;
      }
      .checkout-form h4 {
        font-size: 1rem;
        font-weight: 800;
        margin-bottom: 1rem;
        color: var(--gray-900);
      }
      .order-summary-mini {
        background: #fff;
        border-radius: 10px;
        padding: 0.85rem 1rem;
        margin-bottom: 1rem;
        border: 1px solid var(--gray-100);
      }
      .orow {
        display: flex;
        justify-content: space-between;
        font-size: 0.88rem;
        padding: 0.2rem 0;
        color: var(--gray-700);
      }
      .orow.total {
        font-weight: 800;
        border-top: 1px solid var(--gray-100);
        margin-top: 0.5rem;
        padding-top: 0.65rem;
        color: var(--gray-900);
      }
      .frow {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
      }
      .fgroup {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }
      .fgroup label {
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--gray-700);
      }
      .fgroup input,
      .fgroup select,
      .fgroup textarea {
        padding: 0.6rem 0.85rem;
        border: 1.5px solid var(--gray-100);
        border-radius: 10px;
        font-size: 0.9rem;
        font-family: inherit;
        width: 100%;
        outline: none;
        background: #fff;
        transition: border-color 0.2s;
      }
      .fgroup input:focus,
      .fgroup select:focus,
      .fgroup textarea:focus {
        border-color: var(--green);
      }
      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        border: none;
        border-radius: 50px;
        padding: 0.8rem 1.5rem;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        transition: var(--transition);
        width: 100%;
        font-family: inherit;
      }
      .btn-confirm {
        background: var(--green-dark);
        color: #fff;
        box-shadow: 0 4px 14px rgba(31, 173, 82, 0.35);
      }
      .btn-confirm:hover {
        background: #178a3f;
        transform: translateY(-1px);
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none !important;
      }
      .success-box {
        text-align: center;
        padding: 2.5rem;
        background: var(--green-light);
        border-radius: 14px;
        margin-top: 1.25rem;
        display: none;
      }
      .success-box.show {
        display: block;
      }

      /* SHARE ROW */
      .share-row {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.5rem;
      }
      .sbtn {
        background: var(--gray-50);
        color: var(--gray-700);
        border: 1.5px solid var(--gray-100);
        font-size: 0.82rem;
        padding: 0.4rem 1rem;
        border-radius: 50px;
        cursor: pointer;
        flex: 1;
        font-family: inherit;
        font-weight: 600;
        transition: all 0.2s;
      }
      .sbtn:hover {
        background: var(--gray-100);
      }

      /* LOADING */
      .loading {
        text-align: center;
        padding: 5rem 2rem;
        color: var(--gray-500);
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--gray-100);
        border-top-color: var(--green);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        background: var(--gray-900);
        color: #fff;
        padding: 0.75rem 1.5rem;
        border-radius: 50px;
        font-size: 0.9rem;
        font-weight: 600;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 9999;
      }
      .toast.show {
        opacity: 1;
      }

      /* RESPONSIVE: stack on mobile */
      @media (max-width: 760px) {
        .card {
          grid-template-columns: 1fr;
          grid-template-rows: auto auto;
        }
        .img-section {
          border-right: none;
          border-bottom: 1px solid var(--gray-100);
          padding: 1.5rem;
        }
        .img-wrap {
          max-width: 260px;
        }
        .info {
          padding: 1.25rem 1.25rem 1.5rem;
        }
        .pname {
          font-size: 1.35rem;
        }
        .pmain {
          font-size: 1.8rem;
        }
        nav {
          padding: 0 1rem;
        }
        .page {
          margin: 1.25rem auto;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/" class="nav-logo"
        >M<span class="dot"></span>T &nbsp;Mus Tech</a
      >
      <a href="/" class="back-btn">← Retour</a>
    </nav>

    <div class="page" id="page">
      <div class="loading">
        <div class="spinner"></div>
        Chargement...
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      let product = null;
      let currentVariant = 0;
      let currentQty = 1;
      let WILAYAS = [];

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2500);
      }

      function switchImage(el, src) {
        document.getElementById("main-img").src = src;
        document
          .querySelectorAll(".thumb")
          .forEach((t) => t.classList.remove("active"));
        el.classList.add("active");
      }

      function selectVariant(index) {
        currentVariant = index;
        document
          .querySelectorAll(".vchip")
          .forEach((c, i) => c.classList.toggle("active", i === index));
        updatePrice();
      }

      function changeQty(delta) {
        currentQty = Math.max(1, currentQty + delta);
        document.getElementById("qval").textContent = currentQty;
        updatePrice();
      }

      function updatePrice() {
        if (!product) return;
        const price =
          product.variantPrices[currentVariant] ?? product.variantPrices[0];
        document.getElementById("price-main").textContent =
          price.toLocaleString() + " DA";
        document.getElementById("qtotal").textContent =
          (price * currentQty).toLocaleString() + " DA";
      }

      function copyLink() {
        navigator.clipboard
          .writeText(window.location.href)
          .then(() => showToast("🔗 Lien copié!"))
          .catch(() => prompt("Copiez ce lien:", window.location.href));
      }

      function shareProduct() {
        if (navigator.share)
          navigator.share({ title: product.name, url: window.location.href });
        else copyLink();
      }

      // ── CHECKOUT FORM ─────────────────────────────────────
      function openCheckout() {
        const form = document.getElementById("checkout-form");
        if (!form) return;
        form.classList.add("open");
        const sel = document.getElementById("co-wilaya");
        if (sel.options.length <= 1) {
          WILAYAS.forEach((w) => {
            const o = document.createElement("option");
            o.value = w.shipping_price ?? w.price ?? 0;
            o.dataset.name = w.name;
            o.textContent =
              w.name + " — " + (w.shipping_price ?? w.price ?? 0) + " DA";
            sel.appendChild(o);
          });
          sel.onchange = updateOrderSummary;
        }
        try {
          const user = JSON.parse(localStorage.getItem("mt_user"));
          if (user) {
            if (user.name && !document.getElementById("co-name").value)
              document.getElementById("co-name").value = user.name;
            if (user.phone && !document.getElementById("co-phone").value)
              document.getElementById("co-phone").value = user.phone;
          }
        } catch (e) {}
        updateOrderSummary();
        setTimeout(
          () => form.scrollIntoView({ behavior: "smooth", block: "nearest" }),
          100,
        );
      }

      function updateOrderSummary() {
        if (!product) return;
        const price =
          product.variantPrices[currentVariant] ?? product.variantPrices[0];
        const variant = product.variants[currentVariant] || "Standard";
        const subtotal = price * currentQty;
        const sel = document.getElementById("co-wilaya");
        const shipping = sel ? parseInt(sel.value) || 0 : 0;
        const wilayaName =
          sel && sel.selectedIndex > 0
            ? sel.options[sel.selectedIndex].dataset.name
            : "—";
        const total = subtotal + shipping;
        const summary = document.getElementById("order-summary-mini");
        if (summary)
          summary.innerHTML = `
          <div class="orow"><span>${product.name} (${variant}) ×${currentQty}</span><span>${subtotal.toLocaleString()} DA</span></div>
          <div class="orow"><span>Livraison (${wilayaName})</span><span>${shipping ? shipping.toLocaleString() + " DA" : "—"}</span></div>
          <div class="orow total"><span>Total</span><span>${total.toLocaleString()} DA</span></div>`;
      }

      async function placeOrder() {
        const name = document.getElementById("co-name").value.trim();
        const phone = document.getElementById("co-phone").value.trim();
        const wilayaEl = document.getElementById("co-wilaya");
        const wilaya =
          wilayaEl.options[wilayaEl.selectedIndex]?.dataset.name || "";
        const address = document.getElementById("co-address").value.trim();
        const note = document.getElementById("co-note").value.trim();
        if (!name || !phone || !wilaya || !address) {
          showToast("⚠️ Veuillez remplir tous les champs *");
          return;
        }
        const orderData = {
          customer: name,
          phone,
          wilaya,
          address,
          note,
          items: [{ id: product.id, variant: currentVariant, qty: currentQty }],
        };
        const btn = document.getElementById("confirm-btn");
        btn.disabled = true;
        btn.textContent = "⏳ En cours...";
        try {
          const res = await OrdersAPI.place(orderData);
          document.getElementById("checkout-form").classList.remove("open");
          const box = document.getElementById("success-box");
          box.innerHTML = `
            <div style="font-size:3rem;margin-bottom:1rem;">✅</div>
            <h2 style="color:var(--green-dark);margin-bottom:0.5rem;">Commande confirmée !</h2>
            <p style="color:var(--gray-700);margin-bottom:0.25rem;">Merci <strong>${name}</strong>, nous vous contacterons au <strong>${phone}</strong>.</p>
            <p style="color:var(--green-dark);font-weight:700;font-size:1.1rem;margin:0.75rem 0;">${res.order_ref || "#MT-" + res.id}</p>
            <a href="/" style="display:inline-block;margin-top:1rem;padding:0.75rem 2rem;background:var(--green);color:#fff;border-radius:50px;font-weight:700;text-decoration:none;">← Retour à la boutique</a>`;
          box.classList.add("show");
          box.scrollIntoView({ behavior: "smooth", block: "center" });
        } catch (e) {
          showToast("⚠️ Erreur: " + e.message);
          btn.disabled = false;
          btn.textContent = "✅ Confirmer la Commande";
        }
      }

      // ── RENDER ──────────────────────────────────────────────
      function renderProduct(p) {
        const images =
          p.images && p.images.length > 0 ? p.images : p.img ? [p.img] : [];

        const mainImgHTML =
          images.length > 0
            ? `<img src="${images[0]}" id="main-img" style="width:100%;height:100%;object-fit:contain;padding:1.25rem;"/>`
            : `<span>${p.icon || "🎮"}</span>`;

        const thumbsHTML =
          images.length > 1
            ? images
                .map(
                  (src, i) =>
                    `<img class="thumb ${i === 0 ? "active" : ""}" src="${src}" onclick="switchImage(this,'${src}')"/>`,
                )
                .join("")
            : "";

        const badgeHTML = p.badge
          ? `<div class="badge ${p.badge === "Sale" ? "sale" : ""}">${p.badge}</div>`
          : "";

        const variantsHTML =
          p.variants.length > 0
            ? `<div class="vlabel">Options</div><div class="variants">${p.variants.map((v, i) => `<button class="vchip ${i === 0 ? "active" : ""}" onclick="selectVariant(${i})">${v}</button>`).join("")}</div>`
            : "";

        const oldPriceHTML = p.oldPrice
          ? `<span class="pold">${p.oldPrice.toLocaleString()} DA</span>`
          : "";

        const discountHTML = p.oldPrice
          ? `<span class="pdiscount">-${Math.round((1 - p.variantPrices[0] / p.oldPrice) * 100)}%</span>`
          : "";

        const stockHTML =
          p.stock > 10
            ? `<span class="stock-badge">✓ En stock (${p.stock})</span>`
            : p.stock > 0
              ? `<span class="stock-badge low">⚠ Stock limité (${p.stock})</span>`
              : `<span class="stock-badge out">✗ Rupture de stock</span>`;

        // Update page title & URL slug
        const slug = p.name
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/(^-|-$)/g, "");
        document.title = p.name + " — Mus Tech";
        window.history.replaceState(
          {},
          "",
          `/product.html?id=${p.id}&slug=${slug}`,
        );

        document.getElementById("page").innerHTML = `
        <div class="card">
          <!-- LEFT: IMAGE -->
          <div class="img-section">
            ${badgeHTML}
            <div class="img-wrap">${mainImgHTML}</div>
            <div class="thumbs">${thumbsHTML}</div>
          </div>

          <!-- RIGHT: INFO -->
          <div class="info">
            <div class="cat">${p.cat}</div>
            <div class="pname">${p.name}</div>
            ${p.description ? `<div class="desc">${p.description}</div>` : ""}
            ${stockHTML}
            ${variantsHTML}
            <div class="price-row">
              <span class="pmain" id="price-main">${p.variantPrices[0].toLocaleString()} DA</span>
              ${oldPriceHTML}
              ${discountHTML}
            </div>
            <div class="qty-row">
              <span class="qlabel">Quantité</span>
              <div class="qctrl">
                <button class="qbtn" onclick="changeQty(-1)">−</button>
                <span class="qval" id="qval">1</span>
                <button class="qbtn" onclick="changeQty(1)">+</button>
              </div>
              <span class="qtotal" id="qtotal">${p.variantPrices[0].toLocaleString()} DA</span>
            </div>
            <div class="share-row">
              <button class="sbtn" onclick="copyLink()">🔗 Copier le lien</button>
              <button class="sbtn" onclick="shareProduct()">📤 Partager</button>
            </div>

            <!-- CHECKOUT FORM (inline, always open) -->
            <div class="checkout-form open" id="checkout-form">
              <h4>🧾 Informations de livraison</h4>
              <div class="order-summary-mini" id="order-summary-mini"></div>
              <div class="frow">
                <div class="fgroup"><label>Nom complet *</label><input id="co-name" placeholder="Votre nom"/></div>
                <div class="fgroup"><label>Téléphone *</label><input id="co-phone" placeholder="06xxxxxxxx"/></div>
              </div>
              <div class="fgroup" style="margin-bottom:0.75rem;">
                <label>Wilaya *</label>
                <select id="co-wilaya"><option value="">-- Choisir --</option></select>
              </div>
              <div class="fgroup" style="margin-bottom:0.75rem;">
                <label>Adresse *</label><input id="co-address" placeholder="Rue, quartier..."/>
              </div>
              <div class="fgroup" style="margin-bottom:1rem;">
                <label>Note (optionnel)</label><textarea id="co-note" rows="2" placeholder="Instructions spéciales..."></textarea>
              </div>
              <button class="btn btn-confirm" id="confirm-btn" onclick="placeOrder()">✅ Confirmer la Commande</button>
            </div>

            <!-- SUCCESS BOX -->
            <div class="success-box" id="success-box"></div>
          </div>
        </div>`;
      }

      async function init() {
        const params = new URLSearchParams(window.location.search);
        const id = parseInt(params.get("id"));
        if (!id) {
          document.getElementById("page").innerHTML =
            '<div class="loading">Produit introuvable. <a href="/">Retour</a></div>';
          return;
        }
        try {
          const [p, wilayas] = await Promise.all([
            ProductsAPI.getOne(id),
            WilayasAPI.getAll(),
          ]);
          WILAYAS = wilayas;
          product = p;
          if (!product.variants || !product.variants.length)
            product.variants = ["Standard"];
          if (!product.variantPrices || !product.variantPrices.length)
            product.variantPrices = [product.price];
          if (typeof product.variants === "string")
            product.variants = JSON.parse(product.variants);
          if (typeof product.variantPrices === "string")
            product.variantPrices = JSON.parse(product.variantPrices);
          if (typeof product.images === "string")
            product.images = JSON.parse(product.images);
          renderProduct(product);
          openCheckout();
        } catch (e) {
          document.getElementById("page").innerHTML =
            '<div class="loading">Impossible de charger ce produit. <a href="/">Retour</a></div>';
        }
      }
      init();
    </script>
  </body>
</html>
