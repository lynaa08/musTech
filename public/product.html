<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produit — Mus Tech</title>
    <script src="api.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap");
      :root {
        --green: #3ecf6e;
        --green-light: #d4f7e2;
        --green-dark: #1fad52;
        --gray-50: #f4f4f5;
        --gray-100: #e8e8ea;
        --gray-300: #b0b0b8;
        --gray-500: #6b6b78;
        --gray-700: #2e2e38;
        --gray-900: #111118;
        --shadow-md: 0 6px 24px rgba(0, 0, 0, 0.09);
        --radius: 14px;
        --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Outfit", system-ui, sans-serif;
        background: #f8fdf9;
        color: var(--gray-900);
        min-height: 100vh;
      }

      nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--gray-100);
        padding: 0 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 64px;
      }
      .nav-logo {
        font-size: 1.2rem;
        font-weight: 900;
        color: var(--gray-900);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .dot {
        width: 8px;
        height: 8px;
        background: var(--green);
        border-radius: 50%;
        display: inline-block;
      }
      .back-btn {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--gray-50);
        border: 1.5px solid var(--gray-100);
        border-radius: 50px;
        padding: 0.4rem 1.1rem;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--gray-700);
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s;
      }
      .back-btn:hover {
        background: var(--gray-100);
      }

      .page {
        max-width: 1140px;
        margin: 2.5rem auto;
        padding: 0 1.25rem;
      }

      /* TWO COLUMN LAYOUT */
      .card {
        background: #fff;
        border-radius: 20px;
        box-shadow: var(--shadow-md);
        display: grid;
        grid-template-columns: 420px 1fr;
        overflow: hidden;
      }

      /* LEFT IMAGE */
      .img-section {
        background: linear-gradient(135deg, var(--gray-50), var(--green-light));
        position: relative;
        padding: 1.5rem 1.5rem 1.25rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        border-right: 1px solid var(--gray-100);
      }
      .img-wrap {
        width: 100%;
        max-width: 380px;
        aspect-ratio: 1/1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 9rem;
        border-radius: 16px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.65);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
      }
      .img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        padding: 1rem;
      }
      .badge {
        position: absolute;
        top: 14px;
        left: 14px;
        background: var(--green);
        color: #fff;
        font-size: 0.72rem;
        font-weight: 700;
        padding: 0.25rem 0.7rem;
        border-radius: 50px;
        z-index: 2;
      }
      .badge.sale {
        background: #ff4b6e;
      }
      .thumbs {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 0.85rem;
        justify-content: center;
      }
      .thumb {
        width: 56px;
        height: 56px;
        object-fit: cover;
        border-radius: 10px;
        cursor: pointer;
        border: 2px solid transparent;
        transition: 0.2s;
        background: #fff;
      }
      .thumb.active {
        border-color: var(--green);
      }

      /* RIGHT INFO + FORM */
      .info {
        padding: 1.75rem 1.75rem 1.75rem;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
      }
      .cat {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--green-dark);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 0.3rem;
      }
      .pname {
        font-size: 1.55rem;
        font-weight: 900;
        line-height: 1.2;
        margin-bottom: 0.4rem;
      }
      .desc {
        font-size: 0.88rem;
        color: var(--gray-500);
        line-height: 1.65;
        margin-bottom: 0.9rem;
      }

      /* VARIANTS + STOCK */
      .variants-stock-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        margin-bottom: 0.9rem;
        flex-wrap: wrap;
      }
      .vlabel {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--gray-700);
        margin-bottom: 0.35rem;
      }
      .variants {
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
      }
      .vchip {
        padding: 0.35rem 0.85rem;
        border-radius: 50px;
        border: 2px solid var(--gray-100);
        background: #fff;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        color: var(--gray-700);
        transition: var(--transition);
      }
      .vchip.active {
        background: var(--green);
        border-color: var(--green);
        color: #fff;
      }
      .stock-icon-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.4rem 0.8rem;
        border-radius: 50px;
        font-size: 0.76rem;
        font-weight: 700;
        flex-shrink: 0;
        border: 2px solid;
        white-space: nowrap;
      }
      .stock-icon-badge svg {
        width: 13px;
        height: 13px;
        flex-shrink: 0;
      }
      .stock-in {
        color: var(--green-dark);
        background: var(--green-light);
        border-color: #a8edca;
      }
      .stock-low {
        color: #d97706;
        background: #fff8e6;
        border-color: #fcd34d;
      }
      .stock-out {
        color: #dc2626;
        background: #fee2e2;
        border-color: #fca5a5;
      }

      /* PRICE + QTY */
      .price-row {
        display: flex;
        align-items: baseline;
        gap: 0.55rem;
        margin-bottom: 0.9rem;
      }
      .pmain {
        font-size: 1.9rem;
        font-weight: 900;
        color: var(--gray-900);
      }
      .pold {
        font-size: 0.92rem;
        color: var(--gray-300);
        text-decoration: line-through;
      }
      .pdiscount {
        font-size: 0.76rem;
        font-weight: 700;
        color: #ff4b6e;
        background: #fee2e2;
        padding: 0.2rem 0.55rem;
        border-radius: 50px;
      }
      .qty-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }
      .qlabel {
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--gray-700);
      }
      .qctrl {
        display: flex;
        align-items: center;
        border: 1.5px solid var(--gray-100);
        border-radius: 50px;
        overflow: hidden;
        background: #fff;
      }
      .qbtn {
        width: 34px;
        height: 34px;
        border: none;
        background: transparent;
        font-size: 1.1rem;
        cursor: pointer;
        color: var(--gray-700);
        transition: background 0.15s;
      }
      .qbtn:hover {
        background: var(--gray-50);
      }
      .qval {
        width: 32px;
        text-align: center;
        font-weight: 700;
        font-size: 0.92rem;
      }
      .qtotal {
        font-size: 0.88rem;
        font-weight: 700;
        color: var(--green-dark);
      }

      /* DIVIDER */
      .divider {
        height: 1px;
        background: var(--gray-100);
        margin: 0.85rem 0;
      }

      /* FORM SECTION */
      .form-section {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }
      .form-title {
        font-size: 0.78rem;
        font-weight: 800;
        color: var(--gray-700);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        margin-bottom: 0.1rem;
      }
      .frow {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.6rem;
      }
      .fgroup {
        display: flex;
        flex-direction: column;
        gap: 0.28rem;
      }
      .fgroup label {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--gray-700);
      }
      .fgroup input,
      .fgroup select,
      .fgroup textarea {
        padding: 0.52rem 0.8rem;
        border: 1.5px solid var(--gray-100);
        border-radius: 10px;
        font-size: 0.87rem;
        font-family: inherit;
        width: 100%;
        outline: none;
        background: #fff;
        transition: border-color 0.2s;
      }
      .fgroup input:focus,
      .fgroup select:focus,
      .fgroup textarea:focus {
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(62, 207, 110, 0.1);
      }

      /* DELIVERY TYPE TOGGLE */
      .delivery-toggle {
        display: flex;
        gap: 0.5rem;
      }
      .del-option {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 0.55rem;
        padding: 0.7rem 0.85rem;
        border-radius: 12px;
        cursor: pointer;
        border: 2px solid var(--gray-100);
        background: #fff;
        transition: all 0.2s;
      }
      .del-option.active {
        border-color: var(--green);
        background: var(--green-light);
      }
      .del-option svg {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        transition: stroke 0.2s;
      }
      .del-option .del-title {
        font-size: 0.84rem;
        font-weight: 700;
        color: var(--gray-700);
        transition: color 0.2s;
      }
      .del-option .del-sub {
        font-size: 0.7rem;
        color: var(--gray-500);
      }
      .del-option.active .del-title {
        color: var(--green-dark);
      }
      .del-option.active svg {
        stroke: var(--green-dark);
      }

      /* ORDER SUMMARY */
      .order-summary-mini {
        background: #fff;
        border-radius: 10px;
        padding: 0.7rem 0.9rem;
        border: 1px solid var(--gray-100);
      }
      .orow {
        display: flex;
        justify-content: space-between;
        font-size: 0.84rem;
        padding: 0.15rem 0;
        color: var(--gray-700);
      }
      .orow.total {
        font-weight: 800;
        border-top: 1px solid var(--gray-100);
        margin-top: 0.35rem;
        padding-top: 0.5rem;
        color: var(--gray-900);
      }

      /* BUTTONS */
      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        border: none;
        border-radius: 50px;
        padding: 0.78rem 1.4rem;
        font-size: 0.93rem;
        font-weight: 700;
        cursor: pointer;
        transition: var(--transition);
        width: 100%;
        font-family: inherit;
      }
      .btn-confirm {
        background: var(--green-dark);
        color: #fff;
        box-shadow: 0 4px 14px rgba(31, 173, 82, 0.3);
      }
      .btn-confirm:hover {
        background: #178a3f;
        transform: translateY(-1px);
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none !important;
      }
      .share-row {
        display: flex;
        gap: 0.5rem;
      }
      .share-icon-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        background: var(--gray-50);
        border: 1.5px solid var(--gray-100);
        border-radius: 50px;
        padding: 0.52rem 0.9rem;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--gray-700);
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }
      .share-icon-btn:hover {
        background: var(--gray-100);
      }
      .share-icon-btn svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }

      /* SUCCESS */
      .success-box {
        text-align: center;
        padding: 2rem;
        background: var(--green-light);
        border-radius: 14px;
        display: none;
      }
      .success-box.show {
        display: block;
      }

      /* LOADING */
      .loading {
        text-align: center;
        padding: 5rem 2rem;
        color: var(--gray-500);
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--gray-100);
        border-top-color: var(--green);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        background: var(--gray-900);
        color: #fff;
        padding: 0.75rem 1.5rem;
        border-radius: 50px;
        font-size: 0.9rem;
        font-weight: 600;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 9999;
      }
      .toast.show {
        opacity: 1;
      }

      @media (max-width: 860px) {
        .card {
          grid-template-columns: 1fr;
        }
        .img-section {
          border-right: none;
          border-bottom: 1px solid var(--gray-100);
        }
        .img-wrap {
          max-width: 260px;
          font-size: 6rem;
        }
        .info {
          padding: 1.25rem;
        }
        .pname {
          font-size: 1.3rem;
        }
        .pmain {
          font-size: 1.6rem;
        }
        .frow {
          grid-template-columns: 1fr;
        }
        nav {
          padding: 0 1rem;
        }
        .page {
          margin: 1.25rem auto;
        }
        .variants-stock-row {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>

          "Mila - Mila Centre",
          "Ghardaïa - Ghardaïa Centre",
          "El Oued - El Oued Centre",
          "Ouargla - Ouargla Centre",
          "Laghouat - Laghouat Centre",
          "Tébessa - Tébessa Centre",
          "Souk Ahras - Souk Ahras Centre",
          "Guelma - Guelma Centre",
          "Mostaganem - Mostaganem Centre",
          "Tiaret - Tiaret Centre",
          "Sidi Bel Abbès - SBA Centre",
          "Mascara - Mascara Centre",
          "Aïn Defla - Aïn Defla Centre",
          "Aïn Témouchent - Aïn Témouchent Centre",
        ],
      };

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2500);
      }

      function switchImage(el, src) {
        document.getElementById("main-img").src = src;
        document
          .querySelectorAll(".thumb")
          .forEach((t) => t.classList.remove("active"));
        el.classList.add("active");
      }

      function selectVariant(index) {
        currentVariant = index;
        document
          .querySelectorAll(".vchip")
          .forEach((c, i) => c.classList.toggle("active", i === index));
        updatePrice();
        updateOrderSummary();
      }

      function changeQty(delta) {
        currentQty = Math.max(1, currentQty + delta);
        document.getElementById("qval").textContent = currentQty;
        updatePrice();
        updateOrderSummary();
      }

      function updatePrice() {
        if (!product) return;
        const price =
          product.variantPrices[currentVariant] ?? product.variantPrices[0];
        document.getElementById("price-main").textContent =
          price.toLocaleString() + " DA";
        document.getElementById("qtotal").textContent =
          (price * currentQty).toLocaleString() + " DA";
      }

      function copyLink() {
        navigator.clipboard
          .writeText(window.location.href)
          .then(() => showToast("🔗 Lien copié!"))
          .catch(() => prompt("Copiez ce lien:", window.location.href));
      }

      function shareProduct() {
        if (navigator.share)
          navigator.share({ title: product.name, url: window.location.href });
        else copyLink();
      }

      // ── DELIVERY TYPE ─────────────────────────────────────────
      function setDelivery(type) {
        deliveryType = type;
        const domEl = document.getElementById("del-domicile");
        const burEl = document.getElementById("del-bureau");
        const bureauFields = document.getElementById("bureau-fields");
        const domFields = document.getElementById("domicile-fields");

        if (type === "domicile") {
          domEl.classList.add("active");
          burEl.classList.remove("active");
          bureauFields.style.display = "none";
          domFields.style.display = "flex";
        } else {
          burEl.classList.add("active");
          domEl.classList.remove("active");
          bureauFields.style.display = "flex";
          domFields.style.display = "none";
        }
        updateOrderSummary();
      }

      function updateBureauOffices() {
        const company = document.getElementById("co-company")?.value;
        const officeSelect = document.getElementById("co-office");
        if (!officeSelect) return;
        officeSelect.innerHTML =
          '<option value="">-- Choisir le bureau --</option>';
        if (company && BUREAU_OFFICES[company]) {
          BUREAU_OFFICES[company].forEach((office) => {
            const o = document.createElement("option");
            o.value = office;
            o.textContent = office;
            officeSelect.appendChild(o);
          });
          officeSelect.style.display = "block";
        } else {
          officeSelect.style.display = "none";
        }
      }

      // ── WILAYA + SUMMARY ──────────────────────────────────────
      function populateWilayas() {
        const sel = document.getElementById("co-wilaya");
        if (!sel || sel.options.length > 1) return;
        WILAYAS.forEach((w) => {
          const o = document.createElement("option");
          o.value = w.shipping_price ?? w.price ?? 0;
          o.dataset.name = w.name;
          o.textContent =
            w.name + " — " + (w.shipping_price ?? w.price ?? 0) + " DA";
          sel.appendChild(o);
        });
        sel.onchange = updateOrderSummary;
        try {
          const user = JSON.parse(localStorage.getItem("mt_user"));
          if (user) {
            if (user.name) document.getElementById("co-name").value = user.name;
            if (user.phone)
              document.getElementById("co-phone").value = user.phone;
          }
        } catch (e) {}
        updateOrderSummary();
      }

      function updateOrderSummary() {
        if (!product) return;
        const price =
          product.variantPrices[currentVariant] ?? product.variantPrices[0];
        const variant = product.variants[currentVariant] || "Standard";
        const subtotal = price * currentQty;
        const sel = document.getElementById("co-wilaya");
        const shipping = sel ? parseInt(sel.value) || 0 : 0;
        const wilayaName =
          sel && sel.selectedIndex > 0
            ? sel.options[sel.selectedIndex].dataset.name
            : "—";
        const typeLabel =
          deliveryType === "bureau" ? "Au Bureau" : "À Domicile";
        const summary = document.getElementById("order-summary-mini");
        if (summary)
          summary.innerHTML = `
          <div class="orow"><span>${product.name} (${variant}) ×${currentQty}</span><span>${subtotal.toLocaleString()} DA</span></div>
          <div class="orow"><span>Livraison ${typeLabel} (${wilayaName})</span><span>${shipping ? shipping.toLocaleString() + " DA" : "—"}</span></div>
          <div class="orow total"><span>Total</span><span>${(subtotal + shipping).toLocaleString()} DA</span></div>`;
      }

      // ── PLACE ORDER ───────────────────────────────────────────
      async function placeOrder() {
        const name = document.getElementById("co-name").value.trim();
        const phone = document.getElementById("co-phone").value.trim();
        const wilEl = document.getElementById("co-wilaya");
        const wilaya = wilEl.options[wilEl.selectedIndex]?.dataset.name || "";
        const note = document.getElementById("co-note").value.trim();

        if (!phone || !wilaya) {
          showToast("⚠️ Téléphone et Wilaya sont obligatoires");
          return;
        }

        let address = "";
        if (deliveryType === "bureau") {
          const compEl = document.getElementById("co-company");
          const offEl = document.getElementById("co-office");
          const company = compEl?.options[compEl.selectedIndex]?.text || "";
          const office = offEl?.value || "";
          if (!company || !office) {
            showToast("⚠️ Choisissez la société et le bureau");
            return;
          }
          address = "Bureau — " + company + " — " + office;
        } else {
          address =
            "Domicile — " +
            (document.getElementById("co-address").value.trim() || "—");
        }

        const orderData = {
          customer: name || phone,
          phone,
          wilaya,
          address,
          note,
          items: [{ id: product.id, variant: currentVariant, qty: currentQty }],
        };

        const btn = document.getElementById("confirm-btn");
        btn.disabled = true;
        btn.textContent = "⏳ En cours...";

        try {
          const res = await OrdersAPI.place(orderData);
          // save guest order
          try {
            const saved = JSON.parse(
              localStorage.getItem("mt_guest_orders") || "[]",
            );
            saved.unshift({
              id: res.id,
              order_ref: res.order_ref || "#MT-" + res.id,
              customer: orderData.customer,
              phone,
              wilaya,
              items: [{ name: product.name, qty: currentQty }],
              total: res.total || 0,
              status: "pending",
              created_at: new Date().toISOString(),
            });
            localStorage.setItem(
              "mt_guest_orders",
              JSON.stringify(saved.slice(0, 20)),
            );
          } catch (e) {}

          document.getElementById("checkout-form").style.display = "none";
          document.getElementById("share-actions").style.display = "none";
          const box = document.getElementById("success-box");
          box.innerHTML = `
            <div style="font-size:3rem;margin-bottom:0.75rem;">✅</div>
            <h2 style="color:var(--green-dark);margin-bottom:0.4rem;font-size:1.2rem;">Commande confirmée !</h2>
            <p style="color:var(--gray-700);font-size:0.9rem;margin-bottom:0.3rem;">Merci <strong>${orderData.customer}</strong>, nous vous contacterons au <strong>${phone}</strong>.</p>
            <p style="color:var(--green-dark);font-weight:800;font-size:1.05rem;margin:0.6rem 0;">${res.order_ref || "#MT-" + res.id}</p>
            <p style="font-size:0.82rem;color:var(--gray-500);margin-bottom:1rem;">${address}</p>
            <a href="/" style="display:inline-block;padding:0.65rem 1.75rem;background:var(--green);color:#fff;border-radius:50px;font-weight:700;text-decoration:none;font-size:0.9rem;">← Retour à la boutique</a>`;
          box.classList.add("show");
          box.scrollIntoView({ behavior: "smooth", block: "center" });
        } catch (e) {
          showToast("⚠️ Erreur: " + e.message);
          btn.disabled = false;
          btn.textContent = "✅ Confirmer la Commande";
        }
      }

      // ── STOCK BADGE ───────────────────────────────────────────
      function stockBadge(stock) {
        if (stock > 10)
          return `<span class="stock-icon-badge stock-in"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 4L6 11l-3-3"/></svg>En stock (${stock})</span>`;
        if (stock > 0)
          return `<span class="stock-icon-badge stock-low"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v5M8 11v1"/></svg>Stock limité (${stock})</span>`;
        return `<span class="stock-icon-badge stock-out"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l8 8M12 4l-8 8"/></svg>Rupture</span>`;
      }

      // ── RENDER ────────────────────────────────────────────────
      function renderProduct(p) {
        const images = p.images?.length ? p.images : p.img ? [p.img] : [];
        const mainImg = images.length
          ? `<img src="${images[0]}" id="main-img" style="width:100%;height:100%;object-fit:contain;padding:1rem;"/>`
          : `<span>${p.icon || "🎮"}</span>`;
        const thumbs =
          images.length > 1
            ? images
                .map(
                  (s, i) =>
                    `<img class="thumb ${i === 0 ? "active" : ""}" src="${s}" onclick="switchImage(this,'${s}')"/>`,
                )
                .join("")
            : "";
        const badgeHTML = p.badge
          ? `<div class="badge ${p.badge === "Sale" ? "sale" : ""}">${p.badge}</div>`
          : "";
        const variantsHTML = p.variants
          .map(
            (v, i) =>
              `<button class="vchip ${i === 0 ? "active" : ""}" onclick="selectVariant(${i})">${v}</button>`,
          )
          .join("");
        const oldHTML = p.oldPrice
          ? `<span class="pold">${p.oldPrice.toLocaleString()} DA</span>`
          : "";
        const discHTML = p.oldPrice
          ? `<span class="pdiscount">-${Math.round((1 - p.variantPrices[0] / p.oldPrice) * 100)}%</span>`
          : "";

        document.title = p.name + " — Mus Tech";
        const slug = p.name
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/(^-|-$)/g, "");
        window.history.replaceState(
          {},
          "",
          `/product.html?id=${p.id}&slug=${slug}`,
        );

        document.getElementById("page").innerHTML = `
        <div class="card">
          <!-- LEFT IMAGE -->
          <div class="img-section">
            ${badgeHTML}
            <div class="img-wrap">${mainImg}</div>
            <div class="thumbs">${thumbs}</div>
          </div>

          <!-- RIGHT -->
          <div class="info">
            <div class="cat">${p.cat}</div>
            <div class="pname">${p.name}</div>
            ${p.description ? `<div class="desc">${p.description}</div>` : ""}

            <div class="variants-stock-row">
              <div>
                <div class="vlabel">Options</div>
                <div class="variants">${variantsHTML}</div>
              </div>
              ${stockBadge(p.stock)}
            </div>

            <div class="price-row">
              <span class="pmain" id="price-main">${p.variantPrices[0].toLocaleString()} DA</span>
              ${oldHTML}${discHTML}
            </div>

            <div class="qty-row">
              <span class="qlabel">Quantité</span>
              <div class="qctrl">
                <button class="qbtn" onclick="changeQty(-1)">−</button>
                <span class="qval" id="qval">1</span>
                <button class="qbtn" onclick="changeQty(1)">+</button>
              </div>
              <span class="qtotal" id="qtotal">${p.variantPrices[0].toLocaleString()} DA</span>
            </div>

            <div class="divider"></div>

            <!-- FORM -->
            <div class="checkout-form" id="checkout-form">
              <div class="form-section">
                <div class="form-title">🧾 Informations de livraison</div>

                <!-- SUMMARY -->
                <div class="order-summary-mini" id="order-summary-mini"></div>

                <!-- NOM + TEL -->
                <div class="frow">
                  <div class="fgroup">
                    <label>Nom <span style="font-weight:400;color:var(--gray-400)">(facultatif)</span></label>
                    <input id="co-name" placeholder="Ahmed Benali"/>
                  </div>
                  <div class="fgroup">
                    <label>Téléphone *</label>
                    <input id="co-phone" type="tel" placeholder="06xxxxxxxx"/>
                  </div>
                </div>

                <!-- WILAYA -->
                <div class="fgroup">
                  <label>Wilaya *</label>
                  <select id="co-wilaya"><option value="">-- Choisir votre Wilaya --</option></select>
                </div>

                <!-- DELIVERY TYPE -->
                <div class="fgroup">
                  <label>Type de livraison</label>
                  <div class="delivery-toggle">
                    <div class="del-option active" id="del-domicile" onclick="setDelivery('domicile')">
                      <svg viewBox="0 0 24 24" fill="none" stroke="var(--green-dark)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                      <div>
                        <div class="del-title">À Domicile</div>
                        <div class="del-sub">Livré chez vous</div>
                      </div>
                    </div>
                    <div class="del-option" id="del-bureau" onclick="setDelivery('bureau')">
                      <svg viewBox="0 0 24 24" fill="none" stroke="var(--gray-500)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
                      <div>
                        <div class="del-title">Au Bureau</div>
                        <div class="del-sub">Point de retrait</div>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- DOMICILE FIELDS -->
                <div id="domicile-fields" style="display:flex;flex-direction:column;gap:0.6rem;">
                  <div class="fgroup">
                    <label>Adresse <span style="font-weight:400;color:var(--gray-400)">(facultatif)</span></label>
                    <input id="co-address" placeholder="Rue, quartier, commune..."/>
                  </div>
                </div>

                <!-- BUREAU FIELDS -->
                <div id="bureau-fields" style="display:none;flex-direction:column;gap:0.6rem;">
                  <div class="fgroup">
                    <label>Société de livraison *</label>
                    <select id="co-company" onchange="updateBureauOffices()">
                      <option value="">-- Choisir la société --</option>
                      <option value="yalidine">Yalidine Express</option>
                      <option value="zaki">Zaki Express</option>
                      <option value="procolis">Procolis</option>
                      <option value="noest">Noest Express</option>
                      <option value="eship">eShip</option>
                      <option value="maystro">Maystro Delivery</option>
                      <option value="dhlex">DHlex</option>
                      <option value="guepex">Guepex</option>
                    </select>
                  </div>
                  <div class="fgroup">
                    <label>Bureau de dépôt *</label>
                    <select id="co-office" style="display:none">
                      <option value="">-- Choisir le bureau --</option>
                    </select>
                  </div>
                </div>

                <!-- NOTE -->
                <div class="fgroup">
                  <label>Note <span style="font-weight:400;color:var(--gray-400)">(optionnel)</span></label>
                  <textarea id="co-note" rows="2" placeholder="Instructions spéciales..."></textarea>
                </div>

                <!-- CONFIRM -->
                <button class="btn btn-confirm" id="confirm-btn" onclick="placeOrder()">✅ Confirmer la Commande</button>
              </div>
            </div>

            <!-- SHARE -->
            <div class="share-row" id="share-actions" style="margin-top:0.6rem;">
              <button class="share-icon-btn" onclick="copyLink()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                Copier le lien
              </button>
              <button class="share-icon-btn" onclick="shareProduct()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                Partager
              </button>
            </div>

            <!-- SUCCESS -->
            <div class="success-box" id="success-box"></div>
          </div>
        </div>`;
      }

      async function init() {
        const id = parseInt(
          new URLSearchParams(window.location.search).get("id"),
        );
        if (!id) {
          document.getElementById("page").innerHTML =
            '<div class="loading">Produit introuvable. <a href="/">Retour</a></div>';
          return;
        }
        try {
          const [p, wilayas] = await Promise.all([
            ProductsAPI.getOne(id),
            WilayasAPI.getAll(),
          ]);
          WILAYAS = wilayas;
          product = p;
          if (!product.variants?.length) product.variants = ["Standard"];
          if (!product.variantPrices?.length)
            product.variantPrices = [product.price];
          if (typeof product.variants === "string")
            product.variants = JSON.parse(product.variants);
          if (typeof product.variantPrices === "string")
            product.variantPrices = JSON.parse(product.variantPrices);
          if (typeof product.images === "string")
            product.images = JSON.parse(product.images);
          renderProduct(product);
          populateWilayas();
        } catch (e) {
          document.getElementById("page").innerHTML =
            '<div class="loading">Impossible de charger ce produit. <a href="/">Retour</a></div>';
        }
      }
      init();
    </script>
  </body>
</html>
