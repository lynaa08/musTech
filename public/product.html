<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produit — Mus Tech</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="api.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap");
      :root {
        --green: #3ecf6e;
        --green-light: #d4f7e2;
        --green-mid: #a8edca;
        --green-dark: #1fad52;
        --white: #ffffff;
        --off-white: #f8fdf9;
        --gray-50: #f4f4f5;
        --gray-100: #e8e8ea;
        --gray-300: #b0b0b8;
        --gray-500: #6b6b78;
        --gray-700: #2e2e38;
        --gray-900: #111118;
        --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
        --shadow-md: 0 6px 24px rgba(0,0,0,0.09);
        --radius: 14px;
        --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        font-family: "Outfit", "Segoe UI", system-ui, -apple-system, sans-serif;
        background: var(--white);
        color: var(--gray-900);
        min-height: 100vh;
      }

      /* NAVBAR */
      nav {
        position: sticky; top: 0; z-index: 100;
        background: rgba(255,255,255,0.92);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--gray-100);
        padding: 0 2rem;
        display: flex; align-items: center; justify-content: space-between;
        height: 64px;
      }
      .nav-logo {
        font-size: 1.2rem; font-weight: 900; color: var(--gray-900);
        text-decoration: none; display: flex; align-items: center; gap: 0.4rem;
      }
      .nav-logo .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; display: inline-block; }
      .back-btn {
        display: flex; align-items: center; gap: 0.5rem;
        background: var(--gray-50); border: 1.5px solid var(--gray-100);
        border-radius: 50px; padding: 0.4rem 1.1rem;
        font-size: 0.9rem; font-weight: 600; color: var(--gray-700);
        cursor: pointer; text-decoration: none; transition: var(--transition);
      }
      .back-btn:hover { background: var(--gray-100); }

      /* PAGE LAYOUT */
      .product-page {
        max-width: 900px; margin: 3rem auto; padding: 0 1.5rem;
      }

      /* PRODUCT CARD */
      .product-detail-card {
        display: grid; grid-template-columns: 1fr 1fr; gap: 3rem;
        background: var(--white); border-radius: 20px;
        box-shadow: var(--shadow-md); overflow: hidden; padding: 2.5rem;
      }
      @media (max-width: 640px) {
        .product-detail-card { grid-template-columns: 1fr; gap: 1.5rem; padding: 1.5rem; }
      }

      /* IMAGE SIDE */
      .product-image-side {}
      .main-img-wrap {
        background: linear-gradient(135deg, var(--gray-50), var(--green-light));
        border-radius: 16px; overflow: hidden;
        width: 100%; aspect-ratio: 1/1;
        display: flex; align-items: center; justify-content: center;
        font-size: 7rem; position: relative; margin-bottom: 0.75rem;
      }
      .main-img-wrap img { width: 100%; height: 100%; object-fit: contain; padding: 1.5rem; }
      .badge {
        position: absolute; top: 14px; left: 14px;
        background: var(--green); color: #fff;
        font-size: 0.72rem; font-weight: 700;
        padding: 0.25rem 0.7rem; border-radius: 50px;
      }
      .badge.sale { background: #ff4b6e; }
      .thumbnails { display: flex; gap: 0.5rem; flex-wrap: wrap; }
      .thumb {
        width: 56px; height: 56px; object-fit: cover;
        border-radius: 8px; cursor: pointer;
        border: 2px solid transparent; transition: 0.2s;
      }
      .thumb.active { border-color: var(--green); }

      /* INFO SIDE */
      .product-info-side { display: flex; flex-direction: column; gap: 1.25rem; }
      .product-cat {
        font-size: 0.72rem; font-weight: 700; color: var(--green-dark);
        text-transform: uppercase; letter-spacing: 0.06em;
      }
      .product-name { font-size: 1.6rem; font-weight: 900; line-height: 1.2; }
      .product-desc { font-size: 0.9rem; color: var(--gray-500); line-height: 1.7; }

      /* VARIANTS */
      .variants-label { font-size: 0.8rem; font-weight: 700; color: var(--gray-700); margin-bottom: 0.4rem; }
      .variants-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
      .variant-chip {
        padding: 0.35rem 1rem; border-radius: 50px;
        border: 2px solid var(--gray-100); background: var(--white);
        font-size: 0.85rem; font-weight: 600; cursor: pointer;
        color: var(--gray-700); transition: var(--transition);
      }
      .variant-chip.active {
        background: var(--green); border-color: var(--green); color: #fff;
      }

      /* PRICE */
      .price-row { display: flex; align-items: baseline; gap: 0.6rem; }
      .price-main { font-size: 2rem; font-weight: 900; color: var(--gray-900); }
      .price-old { font-size: 1rem; color: var(--gray-300); text-decoration: line-through; }
      .price-stock { font-size: 0.78rem; font-weight: 600; color: var(--green-dark); }

      /* QTY */
      .qty-row { display: flex; align-items: center; gap: 0.75rem; }
      .qty-label { font-size: 0.8rem; font-weight: 700; color: var(--gray-700); }
      .qty-ctrl {
        display: flex; align-items: center;
        border: 1.5px solid var(--gray-100); border-radius: 50px; overflow: hidden;
      }
      .qty-btn {
        width: 36px; height: 36px; border: none; background: transparent;
        font-size: 1.2rem; cursor: pointer; color: var(--gray-700);
        transition: background 0.2s;
      }
      .qty-btn:hover { background: var(--gray-50); }
      .qty-val { width: 36px; text-align: center; font-weight: 700; font-size: 0.95rem; }
      .qty-total { font-size: 0.9rem; font-weight: 700; color: var(--green-dark); }

      /* BUTTONS */
      .btn {
        display: inline-flex; align-items: center; justify-content: center;
        gap: 0.5rem; border: none; border-radius: 50px;
        padding: 0.75rem 1.5rem; font-size: 0.95rem; font-weight: 700;
        cursor: pointer; transition: var(--transition); text-decoration: none;
      }
      .btn-primary {
        background: var(--green); color: #fff;
        box-shadow: 0 4px 14px rgba(62,207,110,0.35); width: 100%;
      }
      .btn-primary:hover { background: var(--green-dark); transform: translateY(-1px); }
      .btn-ghost {
        background: var(--gray-50); color: var(--gray-700);
        border: 1.5px solid var(--gray-100); width: 100%;
      }
      .btn-ghost:hover { background: var(--gray-100); }
      .btn-share {
        background: var(--gray-50); color: var(--gray-700);
        border: 1.5px solid var(--gray-100);
        font-size: 0.82rem; padding: 0.4rem 1rem; border-radius: 50px;
        cursor: pointer;
      }
      .btn-share:hover { background: var(--gray-100); }

      /* ACTIONS */
      .actions { display: flex; flex-direction: column; gap: 0.6rem; }
      .share-row { display: flex; gap: 0.5rem; align-items: center; }

      /* LOADING */
      .loading {
        text-align: center; padding: 5rem 2rem;
        color: var(--gray-500); font-size: 1rem;
      }
      .loading .spinner {
        width: 40px; height: 40px; border: 3px solid var(--gray-100);
        border-top-color: var(--green); border-radius: 50%;
        animation: spin 0.8s linear infinite; margin: 0 auto 1rem;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* TOAST */
      .toast {
        position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
        background: var(--gray-900); color: #fff;
        padding: 0.75rem 1.5rem; border-radius: 50px;
        font-size: 0.9rem; font-weight: 600;
        opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999;
      }
      .toast.show { opacity: 1; }

      /* CART SIDEBAR */
      .cart-float {
        position: fixed; bottom: 2rem; right: 2rem;
        background: var(--green); color: #fff;
        border: none; border-radius: 50px;
        padding: 0.75rem 1.25rem; font-size: 0.9rem; font-weight: 700;
        cursor: pointer; box-shadow: 0 4px 20px rgba(62,207,110,0.4);
        display: none; align-items: center; gap: 0.5rem;
        transition: var(--transition); z-index: 100;
      }
      .cart-float.visible { display: flex; }
      .cart-float:hover { background: var(--green-dark); transform: translateY(-2px); }
    </style>
  </head>
  <body>

    <!-- NAVBAR -->
    <nav>
      <a href="/" class="nav-logo">
        <span>M</span><span class="dot"></span><span>T</span>
        &nbsp;Mus Tech
      </a>
      <a href="/" class="back-btn">← Retour à la boutique</a>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="product-page" id="product-page">
      <div class="loading" id="loading-state">
        <div class="spinner"></div>
        Chargement du produit...
      </div>
    </div>

    <!-- CART FLOAT BUTTON -->
    <button class="cart-float" id="cart-float-btn" onclick="goCheckout()">
      🛒 <span id="cart-float-count">0</span> article(s) — Commander
    </button>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
      // ── CART (stored in sessionStorage for cross-page) ─────
      function getCart() {
        try { return JSON.parse(sessionStorage.getItem('mt_cart') || '[]'); } catch { return []; }
      }
      function saveCart(cart) {
        sessionStorage.setItem('mt_cart', JSON.stringify(cart));
      }
      function updateCartBtn() {
        const cart = getCart();
        const total = cart.reduce((s, i) => s + i.qty, 0);
        const btn = document.getElementById('cart-float-btn');
        const cnt = document.getElementById('cart-float-count');
        if (cnt) cnt.textContent = total;
        if (btn) btn.classList.toggle('visible', total > 0);
      }
      function addToCart(productId, variantIndex, qty) {
        const cart = getCart();
        const existing = cart.find(i => i.id === productId && i.variant === variantIndex);
        if (existing) existing.qty += qty;
        else cart.push({ id: productId, variant: variantIndex, qty });
        saveCart(cart);
        updateCartBtn();
        showToast('Ajouté au panier !');
      }
      function goCheckout() {
        window.location.href = '/?checkout=1';
      }

      // ── TOAST ───────────────────────────────────────────────
      function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
      }

      // ── STATE ───────────────────────────────────────────────
      let product = null;
      let currentVariant = 0;
      let currentQty = 1;

      // ── RENDER ──────────────────────────────────────────────
      function renderProduct(p) {
        const images = p.images && p.images.length > 0 ? p.images : p.img ? [p.img] : [];
        const desc = p.description || '';

        const thumbsHTML = images.length > 1
          ? images.map((src, i) => `<img class="thumb ${i===0?'active':''}" src="${src}" onclick="switchImage(this,'${src}')" />`).join('')
          : '';

        const variantsHTML = p.variants.map((v, i) =>
          `<button class="variant-chip ${i===0?'active':''}" onclick="selectVariant(${i})">${v}</button>`
        ).join('');

        const badgeHTML = p.badge
          ? `<span class="badge ${p.badge==='Sale'?'sale':''}">${p.badge}</span>` : '';

        const mainImgHTML = images.length > 0
          ? `<img src="${images[0]}" id="main-img" />`
          : `<span id="main-icon">${p.icon || '🎮'}</span>`;

        const oldPriceHTML = p.oldPrice
          ? `<span class="price-old">${p.oldPrice.toLocaleString()} DA</span>` : '';

        const stockText = p.stock > 10
          ? `En stock (${p.stock})`
          : p.stock > 0 ? `Stock limité (${p.stock})` : 'Rupture de stock';

        document.title = p.name + ' — Mus Tech';

        document.getElementById('product-page').innerHTML = `
          <div class="product-detail-card">
            <!-- IMAGE -->
            <div class="product-image-side">
              <div class="main-img-wrap" id="main-img-wrap">
                ${badgeHTML}
                ${mainImgHTML}
              </div>
              <div class="thumbnails">${thumbsHTML}</div>
            </div>

            <!-- INFO -->
            <div class="product-info-side">
              <div class="product-cat">${p.cat}</div>
              <div class="product-name">${p.name}</div>
              ${desc ? `<div class="product-desc">${desc}</div>` : ''}

              ${p.variants.length > 0 ? `
              <div>
                <div class="variants-label">Options</div>
                <div class="variants-row" id="variants-row">${variantsHTML}</div>
              </div>` : ''}

              <div class="price-row">
                <span class="price-main" id="price-display">${p.variantPrices[0].toLocaleString()} DA</span>
                ${oldPriceHTML}
                <span class="price-stock">${stockText}</span>
              </div>

              <div class="qty-row">
                <span class="qty-label">Qté</span>
                <div class="qty-ctrl">
                  <button class="qty-btn" onclick="changeQty(-1)">−</button>
                  <span class="qty-val" id="qty-display">1</span>
                  <button class="qty-btn" onclick="changeQty(1)">+</button>
                </div>
                <span class="qty-total" id="total-display">${p.variantPrices[0].toLocaleString()} DA</span>
              </div>

              <div class="actions">
                <button class="btn btn-primary" onclick="buyNow()" ${p.stock===0?'disabled':''}>
                  ⚡ Acheter Maintenant
                </button>
                <button class="btn btn-ghost" onclick="addToCartAndShow()" ${p.stock===0?'disabled':''}>
                  🛒 Ajouter au Panier
                </button>
                <div class="share-row">
                  <button class="btn-share" onclick="copyLink()">🔗 Copier le lien</button>
                  <button class="btn-share" onclick="shareProduct()">📤 Partager</button>
                </div>
              </div>
            </div>
          </div>
        `;
        updateCartBtn();
      }

      function switchImage(thumbEl, src) {
        document.getElementById('main-img').src = src;
        document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        thumbEl.classList.add('active');
      }

      function selectVariant(index) {
        currentVariant = index;
        document.querySelectorAll('.variant-chip').forEach((c, i) => c.classList.toggle('active', i === index));
        updatePrice();
      }

      function changeQty(delta) {
        currentQty = Math.max(1, currentQty + delta);
        document.getElementById('qty-display').textContent = currentQty;
        updatePrice();
      }

      function updatePrice() {
        if (!product) return;
        const price = product.variantPrices[currentVariant] ?? product.variantPrices[0];
        document.getElementById('price-display').textContent = price.toLocaleString() + ' DA';
        document.getElementById('total-display').textContent = (price * currentQty).toLocaleString() + ' DA';
      }

      function addToCartAndShow() {
        addToCart(product.id, currentVariant, currentQty);
      }

      function buyNow() {
        addToCart(product.id, currentVariant, currentQty);
        goCheckout();
      }

      function copyLink() {
        navigator.clipboard.writeText(window.location.href).then(() => {
          showToast('Lien copié !');
        }).catch(() => {
          prompt('Copiez ce lien:', window.location.href);
        });
      }

      function shareProduct() {
        if (navigator.share) {
          navigator.share({ title: product.name, url: window.location.href });
        } else {
          copyLink();
        }
      }

      // ── LOAD PRODUCT ────────────────────────────────────────
      async function loadProduct() {
        const params = new URLSearchParams(window.location.search);
        const id = parseInt(params.get('id'));
        if (!id) {
          document.getElementById('product-page').innerHTML =
            '<div class="loading">Produit introuvable. <a href="/">Retour à la boutique</a></div>';
          return;
        }
        try {
          product = await ProductsAPI.getOne(id);
          // Normalize data
          if (!product.variants || !product.variants.length) product.variants = ['Standard'];
          if (!product.variantPrices || !product.variantPrices.length) product.variantPrices = [product.price];
          if (typeof product.variants === 'string') product.variants = JSON.parse(product.variants);
          if (typeof product.variantPrices === 'string') product.variantPrices = JSON.parse(product.variantPrices);
          if (typeof product.images === 'string') product.images = JSON.parse(product.images);
          renderProduct(product);
        } catch(e) {
          document.getElementById('product-page').innerHTML =
            '<div class="loading">Impossible de charger ce produit. <a href="/">Retour à la boutique</a></div>';
        }
      }

      loadProduct();
    </script>
  </body>
</html>
