<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produit — Mus Tech</title>
    <script src="api.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap");
      :root {
        --green: #3ecf6e;
        --green-light: #d4f7e2;
        --green-dark: #1fad52;
        --gray-50: #f4f4f5;
        --gray-100: #e8e8ea;
        --gray-300: #b0b0b8;
        --gray-500: #6b6b78;
        --gray-700: #2e2e38;
        --gray-900: #111118;
        --shadow-md: 0 6px 24px rgba(0, 0, 0, 0.09);
        --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.12);
        --radius: 14px;
        --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Outfit", system-ui, sans-serif;
        background: #f8fdf9;
        color: var(--gray-900);
        min-height: 100vh;
      }

      /* NAV */
      nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--gray-100);
        padding: 0 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 64px;
      }
      .nav-logo {
        font-size: 1.2rem;
        font-weight: 900;
        color: var(--gray-900);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .dot {
        width: 8px;
        height: 8px;
        background: var(--green);
        border-radius: 50%;
        display: inline-block;
      }
      .back-btn {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--gray-50);
        border: 1.5px solid var(--gray-100);
        border-radius: 50px;
        padding: 0.4rem 1.1rem;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--gray-700);
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s;
      }
      .back-btn:hover {
        background: var(--gray-100);
      }

      .page {
        max-width: 1100px;
        margin: 2.5rem auto;
        padding: 0 1.25rem;
      }

      /* CARD */
      .card {
        background: #fff;
        border-radius: 20px;
        box-shadow: var(--shadow-md);
        overflow: visible;
        display: grid;
        grid-template-columns: 460px 1fr;
      }

      /* LEFT: IMAGE */
      .img-section {
        background: linear-gradient(135deg, var(--gray-50), var(--green-light));
        position: relative;
        padding: 1.5rem 1.75rem 1.25rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        border-right: 1px solid var(--gray-100);
        border-radius: 20px 0 0 20px;
      }
      .img-wrap {
        width: 100%;
        max-width: 400px;
        aspect-ratio: 1/1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 9rem;
        border-radius: 16px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.65);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
      }
      .img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        padding: 1rem;
      }
      .badge {
        position: absolute;
        top: 14px;
        left: 14px;
        background: var(--green);
        color: #fff;
        font-size: 0.72rem;
        font-weight: 700;
        padding: 0.25rem 0.7rem;
        border-radius: 50px;
        z-index: 2;
      }
      .badge.sale {
        background: #ff4b6e;
      }
      .thumbs {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 0.85rem;
        justify-content: center;
        align-items: center;
      }
      .thumb {
        width: 64px;
        height: 64px;
        object-fit: cover;
        border-radius: 10px;
        cursor: pointer;
        border: 2px solid transparent;
        transition: 0.2s;
        background: #fff;
        flex-shrink: 0;
        display: block;
      }
      .thumb.active {
        border-color: var(--green);
      }

      /* RIGHT: INFO */
      .info {
        padding: 2rem 2rem 2rem;
        display: flex;
        flex-direction: column;
        gap: 0;
        overflow-y: auto;
      }
      .cat {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--green-dark);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 0.3rem;
      }
      .pname {
        font-size: 1.65rem;
        font-weight: 900;
        line-height: 1.2;
        margin-bottom: 0.5rem;
      }
      .desc {
        font-size: 0.88rem;
        color: var(--gray-500);
        line-height: 1.7;
        margin-bottom: 1rem;
      }

      /* VARIANTS + STOCK ROW */
      .variants-stock-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        margin-bottom: 1.1rem;
        flex-wrap: wrap;
      }
      .variants-left {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }
      .vlabel {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--gray-700);
      }
      .variants {
        display: flex;
        gap: 0.45rem;
        flex-wrap: wrap;
      }
      .vchip {
        padding: 0.38rem 0.9rem;
        border-radius: 50px;
        border: 2px solid var(--gray-100);
        background: #fff;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        color: var(--gray-700);
        transition: var(--transition);
      }
      .vchip.active {
        background: var(--green);
        border-color: var(--green);
        color: #fff;
      }

      /* STOCK ICON BADGE */
      .stock-icon-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.45rem 0.85rem;
        border-radius: 50px;
        font-size: 0.78rem;
        font-weight: 700;
        flex-shrink: 0;
        border: 2px solid;
        white-space: nowrap;
      }
      .stock-icon-badge svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }
      .stock-in {
        color: var(--green-dark);
        background: var(--green-light);
        border-color: #a8edca;
      }
      .stock-low {
        color: #d97706;
        background: #fff8e6;
        border-color: #fcd34d;
      }
      .stock-out {
        color: #dc2626;
        background: #fee2e2;
        border-color: #fca5a5;
      }

      /* PRICE */
      .price-row {
        display: flex;
        align-items: baseline;
        gap: 0.55rem;
        margin-bottom: 1.1rem;
      }
      .pmain {
        font-size: 2rem;
        font-weight: 900;
        color: var(--gray-900);
      }
      .pold {
        font-size: 0.95rem;
        color: var(--gray-300);
        text-decoration: line-through;
      }
      .pdiscount {
        font-size: 0.78rem;
        font-weight: 700;
        color: #ff4b6e;
        background: #fee2e2;
        padding: 0.2rem 0.6rem;
        border-radius: 50px;
      }

      /* QTY */
      .qty-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1.1rem;
      }
      .qlabel {
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--gray-700);
      }
      .qctrl {
        display: flex;
        align-items: center;
        border: 1.5px solid var(--gray-100);
        border-radius: 50px;
        overflow: hidden;
        background: #fff;
      }
      .qbtn {
        width: 36px;
        height: 36px;
        border: none;
        background: transparent;
        font-size: 1.15rem;
        cursor: pointer;
        color: var(--gray-700);
        transition: background 0.15s;
      }
      .qbtn:hover {
        background: var(--gray-50);
      }
      .qval {
        width: 34px;
        text-align: center;
        font-weight: 700;
        font-size: 0.95rem;
      }
      .qtotal {
        font-size: 0.88rem;
        font-weight: 700;
        color: var(--green-dark);
      }

      /* CHECKOUT FORM */
      .checkout-form {
        background: var(--gray-50);
        border-radius: 14px;
        padding: 1.25rem;
        margin-bottom: 0;
      }
      .checkout-form h4 {
        font-size: 0.95rem;
        font-weight: 800;
        margin-bottom: 0.85rem;
        color: var(--gray-900);
      }
      .order-summary-mini {
        background: #fff;
        border-radius: 10px;
        padding: 0.75rem 1rem;
        margin-bottom: 0.85rem;
        border: 1px solid var(--gray-100);
      }
      .orow {
        display: flex;
        justify-content: space-between;
        font-size: 0.85rem;
        padding: 0.18rem 0;
        color: var(--gray-700);
      }
      .orow.total {
        font-weight: 800;
        border-top: 1px solid var(--gray-100);
        margin-top: 0.4rem;
        padding-top: 0.55rem;
        color: var(--gray-900);
      }
      .frow {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.65rem;
        margin-bottom: 0.65rem;
      }
      .fgroup {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }
      .fgroup label {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--gray-700);
      }
      .fgroup input,
      .fgroup select,
      .fgroup textarea {
        padding: 0.55rem 0.8rem;
        border: 1.5px solid var(--gray-100);
        border-radius: 10px;
        font-size: 0.88rem;
        font-family: inherit;
        width: 100%;
        outline: none;
        background: #fff;
        transition: border-color 0.2s;
      }
      .fgroup input:focus,
      .fgroup select:focus,
      .fgroup textarea:focus {
        border-color: var(--green);
      }

      /* BUTTONS */
      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        border: none;
        border-radius: 50px;
        padding: 0.78rem 1.4rem;
        font-size: 0.93rem;
        font-weight: 700;
        cursor: pointer;
        transition: var(--transition);
        width: 100%;
        font-family: inherit;
      }
      .btn-confirm {
        background: var(--green-dark);
        color: #fff;
        box-shadow: 0 4px 14px rgba(31, 173, 82, 0.3);
        margin-bottom: 0.6rem;
      }
      .btn-confirm:hover {
        background: #178a3f;
        transform: translateY(-1px);
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none !important;
      }

      /* SHARE ROW — icon buttons */
      .share-row {
        display: flex;
        gap: 0.5rem;
      }
      .share-icon-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        background: var(--gray-50);
        border: 1.5px solid var(--gray-100);
        border-radius: 50px;
        padding: 0.55rem 0.9rem;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--gray-700);
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }
      .share-icon-btn:hover {
        background: var(--gray-100);
        border-color: var(--gray-300);
      }
      .share-icon-btn svg {
        width: 15px;
        height: 15px;
        flex-shrink: 0;
      }

      /* SUCCESS */
      .success-box {
        text-align: center;
        padding: 2rem;
        background: var(--green-light);
        border-radius: 14px;
        margin-top: 1rem;
        display: none;
      }
      .success-box.show {
        display: block;
      }

      /* LOADING */
      .loading {
        text-align: center;
        padding: 5rem 2rem;
        color: var(--gray-500);
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--gray-100);
        border-top-color: var(--green);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        background: var(--gray-900);
        color: #fff;
        padding: 0.75rem 1.5rem;
        border-radius: 50px;
        font-size: 0.9rem;
        font-weight: 600;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 9999;
      }
      .toast.show {
        opacity: 1;
      }

      /* DIVIDER */
      .divider {
        height: 1px;
        background: var(--gray-100);
        margin: 1rem 0;
      }

      @media (max-width: 820px) {
        .card {
          grid-template-columns: 1fr;
        }
        .img-section {
          border-right: none;
          border-bottom: 1px solid var(--gray-100);
          border-radius: 20px 20px 0 0;
          padding: 1.25rem;
        }
        .img-wrap {
          max-width: 280px;
          font-size: 6rem;
        }
        .info {
          padding: 1.25rem 1.25rem 1.5rem;
        }
        .pname {
          font-size: 1.35rem;
        }
        .pmain {
          font-size: 1.75rem;
        }
        .frow {
          grid-template-columns: 1fr;
        }
        nav {
          padding: 0 1rem;
        }
        .page {
          margin: 1.25rem auto;
        }
        .variants-stock-row {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/" class="nav-logo"
        >M<span class="dot"></span>T &nbsp;Mus Tech</a
      >
      <a href="/" class="back-btn"
        ><svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12" />
          <polyline points="12 19 5 12 12 5" />
        </svg>
        Retour</a
      >
    </nav>

    <div class="page" id="page">
      <div class="loading">
        <div class="spinner"></div>
        Chargement...
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      let product = null;
      let currentVariant = 0;
      let currentQty = 1;
      let WILAYAS = [];

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2500);
      }

      function switchImage(el, src) {
        document.getElementById("main-img").src = src;
        document
          .querySelectorAll(".thumb")
          .forEach((t) => t.classList.remove("active"));
        el.classList.add("active");
      }

      function selectVariant(index) {
        currentVariant = index;
        document
          .querySelectorAll(".vchip")
          .forEach((c, i) => c.classList.toggle("active", i === index));
        updatePrice();
        updateOrderSummary();
      }

      function changeQty(delta) {
        currentQty = Math.max(1, currentQty + delta);
        document.getElementById("qval").textContent = currentQty;
        updatePrice();
        updateOrderSummary();
      }

      function updatePrice() {
        if (!product) return;
        const price =
          product.variantPrices[currentVariant] ?? product.variantPrices[0];
        document.getElementById("price-main").textContent =
          price.toLocaleString() + " DA";
        document.getElementById("qtotal").textContent =
          (price * currentQty).toLocaleString() + " DA";
      }

      function copyLink() {
        navigator.clipboard
          .writeText(window.location.href)
          .then(() => showToast("Lien copié !"))
          .catch(() => prompt("Copiez ce lien:", window.location.href));
      }

      function shareProduct() {
        if (navigator.share)
          navigator.share({ title: product.name, url: window.location.href });
        else copyLink();
      }

      // ── CHECKOUT ─────────────────────────────────────────────
      function populateWilayas() {
        const sel = document.getElementById("co-wilaya");
        if (!sel || sel.options.length > 1) return;
        WILAYAS.forEach((w) => {
          const o = document.createElement("option");
          o.value = w.shipping_price ?? w.price ?? 0;
          o.dataset.name = w.name;
          o.textContent =
            w.name + " — " + (w.shipping_price ?? w.price ?? 0) + " DA";
          sel.appendChild(o);
        });
        sel.onchange = updateOrderSummary;
        try {
          const user = JSON.parse(localStorage.getItem("mt_user"));
          if (user) {
            if (user.name) document.getElementById("co-name").value = user.name;
            if (user.phone)
              document.getElementById("co-phone").value = user.phone;
          }
        } catch (e) {}
        updateOrderSummary();
      }

      function updateOrderSummary() {
        if (!product) return;
        const price =
          product.variantPrices[currentVariant] ?? product.variantPrices[0];
        const variant = product.variants[currentVariant] || "Standard";
        const subtotal = price * currentQty;
        const sel = document.getElementById("co-wilaya");
        const shipping = sel ? parseInt(sel.value) || 0 : 0;
        const wilayaName =
          sel && sel.selectedIndex > 0
            ? sel.options[sel.selectedIndex].dataset.name
            : "—";
        const summary = document.getElementById("order-summary-mini");
        if (summary)
          summary.innerHTML = `
          <div class="orow"><span>${product.name} (${variant}) ×${currentQty}</span><span>${subtotal.toLocaleString()} DA</span></div>
          <div class="orow"><span>Livraison (${wilayaName})</span><span>${shipping ? shipping.toLocaleString() + " DA" : "—"}</span></div>
          <div class="orow total"><span>Total</span><span>${(subtotal + shipping).toLocaleString()} DA</span></div>`;
      }

      async function placeOrder() {
        const name = document.getElementById("co-name").value.trim();
        const phone = document.getElementById("co-phone").value.trim();
        const wilayaEl = document.getElementById("co-wilaya");
        const wilaya =
          wilayaEl.options[wilayaEl.selectedIndex]?.dataset.name || "";
        const address = document.getElementById("co-address").value.trim();
        const note = document.getElementById("co-note").value.trim();
        if (!name || !phone || !wilaya || !address) {
          showToast("Veuillez remplir tous les champs *");
          return;
        }
        const orderData = {
          customer: name,
          phone,
          wilaya,
          address,
          note,
          items: [{ id: product.id, variant: currentVariant, qty: currentQty }],
        };
        const btn = document.getElementById("confirm-btn");
        btn.disabled = true;
        btn.textContent = "En cours...";
        try {
          const res = await OrdersAPI.place(orderData);
          // Save order ref locally so user can track without account
          try {
            const saved = JSON.parse(
              localStorage.getItem("mt_guest_orders") || "[]",
            );
            saved.unshift({
              order_ref: res.order_ref || "#MT-" + res.id,
              id: res.id,
              status: res.status || "pending",
              created_at: res.created_at || new Date().toISOString(),
              wilaya: orderData.wilaya,
              total: res.total,
              items: res.items || orderData.items,
              customer: name,
              phone,
            });
            localStorage.setItem(
              "mt_guest_orders",
              JSON.stringify(saved.slice(0, 50)),
            );
          } catch (e) {}
          document.getElementById("checkout-form").style.display = "none";
          document.getElementById("share-actions").style.display = "none";
          const box = document.getElementById("success-box");
          box.innerHTML = `
            <div style="margin-bottom:1rem;"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--green-dark)"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg></div>
            <h2 style="color:var(--green-dark);margin-bottom:0.5rem;">Commande confirmée !</h2>
            <p style="color:var(--gray-700);margin-bottom:0.25rem;">Merci <strong>${name}</strong>, nous vous contacterons au <strong>${phone}</strong>.</p>
            <p style="color:var(--green-dark);font-weight:700;font-size:1.1rem;margin:0.75rem 0;">${res.order_ref || "#MT-" + res.id}</p>
            <a href="/" style="display:inline-block;margin-top:1rem;padding:0.75rem 2rem;background:var(--green);color:#fff;border-radius:50px;font-weight:700;text-decoration:none;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Retour à la boutique</a>`;
          box.classList.add("show");
          box.scrollIntoView({ behavior: "smooth", block: "center" });
        } catch (e) {
          showToast("Erreur: " + e.message);
          btn.disabled = false;
          btn.textContent = "Confirmer la Commande";
        }
      }

      // ── RENDER ───────────────────────────────────────────────
      function stockIconBadge(stock) {
        if (stock > 10)
          return `
          <span class="stock-icon-badge stock-in">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M13 4L6 11l-3-3"/>
            </svg>
            En stock (${stock})
          </span>`;
        if (stock > 0)
          return `
          <span class="stock-icon-badge stock-low">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 3v5M8 11v1"/>
            </svg>
            Stock limité (${stock})
          </span>`;
        return `
          <span class="stock-icon-badge stock-out">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4l8 8M12 4l-8 8"/>
            </svg>
            Rupture
          </span>`;
      }

      function renderProduct(p) {
        const images =
          p.images && p.images.length > 0 ? p.images : p.img ? [p.img] : [];
        const mainImgHTML =
          images.length > 0
            ? `<img src="${images[0]}" id="main-img" style="width:100%;height:100%;object-fit:contain;padding:1rem;"/>`
            : `<span>${p.icon || "🎮"}</span>`;
        const thumbsHTML =
          images.length > 1
            ? images
                .map(
                  (src, i) =>
                    `<img class="thumb ${i === 0 ? "active" : ""}" src="${src}" onclick="switchImage(this,'${src}')"/>`,
                )
                .join("")
            : "";
        const badgeHTML = p.badge
          ? `<div class="badge ${p.badge === "Sale" ? "sale" : ""}">${p.badge}</div>`
          : "";
        const variantsHTML =
          p.variants.length > 0
            ? p.variants
                .map(
                  (v, i) =>
                    `<button class="vchip ${i === 0 ? "active" : ""}" onclick="selectVariant(${i})">${v}</button>`,
                )
                .join("")
            : "";
        const oldPriceHTML = p.oldPrice
          ? `<span class="pold">${p.oldPrice.toLocaleString()} DA</span>`
          : "";
        const discountHTML = p.oldPrice
          ? `<span class="pdiscount">-${Math.round((1 - p.variantPrices[0] / p.oldPrice) * 100)}%</span>`
          : "";

        const slug = p.name
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/(^-|-$)/g, "");
        document.title = p.name + " — Mus Tech";
        window.history.replaceState(
          {},
          "",
          `/product.html?id=${p.id}&slug=${slug}`,
        );

        document.getElementById("page").innerHTML = `
        <div class="card">
          <!-- LEFT: IMAGE -->
          <div class="img-section">
            ${badgeHTML}
            <div class="img-wrap">${mainImgHTML}</div>
            <div class="thumbs">${thumbsHTML}</div>
          </div>

          <!-- RIGHT: INFO -->
          <div class="info">
            <div class="cat">${p.cat}</div>
            <div class="pname">${p.name}</div>
            ${p.description ? `<div class="desc">${p.description}</div>` : ""}

            <!-- VARIANTS + STOCK SIDE BY SIDE -->
            <div class="variants-stock-row">
              <div class="variants-left">
                <div class="vlabel">Options</div>
                <div class="variants">${variantsHTML}</div>
              </div>
              ${stockIconBadge(p.stock)}
            </div>

            <!-- PRICE -->
            <div class="price-row">
              <span class="pmain" id="price-main">${p.variantPrices[0].toLocaleString()} DA</span>
              ${oldPriceHTML}${discountHTML}
            </div>

            <!-- QTY -->
            <div class="qty-row">
              <span class="qlabel">Quantité</span>
              <div class="qctrl">
                <button class="qbtn" onclick="changeQty(-1)">−</button>
                <span class="qval" id="qval">1</span>
                <button class="qbtn" onclick="changeQty(1)">+</button>
              </div>
              <span class="qtotal" id="qtotal">${p.variantPrices[0].toLocaleString()} DA</span>
            </div>

            <!-- CHECKOUT FORM -->
            <div class="checkout-form" id="checkout-form">
              <h4><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg> Informations de livraison</h4>
              <div class="order-summary-mini" id="order-summary-mini"></div>
              <div class="frow">
                <div class="fgroup"><label>Nom complet *</label><input id="co-name" placeholder="Votre nom"/></div>
                <div class="fgroup"><label>Téléphone *</label><input id="co-phone" placeholder="06xxxxxxxx"/></div>
              </div>
              <div class="fgroup" style="margin-bottom:0.65rem;">
                <label>Wilaya *</label>
                <select id="co-wilaya"><option value="">-- Choisir --</option></select>
              </div>
              <div class="fgroup" style="margin-bottom:0.65rem;">
                <label>Adresse *</label><input id="co-address" placeholder="Rue, quartier..."/>
              </div>
              <div class="fgroup" style="margin-bottom:0.9rem;">
                <label>Note (optionnel)</label><textarea id="co-note" rows="2" placeholder="Instructions spéciales..."></textarea>
              </div>
              <button class="btn btn-confirm" id="confirm-btn" onclick="placeOrder()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Confirmer la Commande</button>
            </div>

            <!-- SHARE BUTTONS — after confirm -->
            <div class="share-row" id="share-actions" style="margin-top:0.6rem;">
              <button class="share-icon-btn" onclick="copyLink()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                  <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                </svg>
                Copier le lien
              </button>
              <button class="share-icon-btn" onclick="shareProduct()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                  <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                  <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                </svg>
                Partager
              </button>
            </div>

            <!-- SUCCESS BOX -->
            <div class="success-box" id="success-box"></div>
          </div>
        </div>`;
      }

      async function init() {
        const params = new URLSearchParams(window.location.search);
        const id = parseInt(params.get("id"));
        if (!id) {
          document.getElementById("page").innerHTML =
            '<div class="loading">Produit introuvable. <a href="/">Retour</a></div>';
          return;
        }
        try {
          const [p, wilayas] = await Promise.all([
            ProductsAPI.getOne(id),
            WilayasAPI.getAll(),
          ]);
          WILAYAS = wilayas;
          product = p;
          if (!product.variants || !product.variants.length)
            product.variants = ["Standard"];
          if (!product.variantPrices || !product.variantPrices.length)
            product.variantPrices = [product.price];
          if (typeof product.variants === "string")
            product.variants = JSON.parse(product.variants);
          if (typeof product.variantPrices === "string")
            product.variantPrices = JSON.parse(product.variantPrices);
          if (typeof product.images === "string")
            product.images = JSON.parse(product.images);
          renderProduct(product);
          populateWilayas();
        } catch (e) {
          document.getElementById("page").innerHTML =
            '<div class="loading">Impossible de charger ce produit. <a href="/">Retour</a></div>';
        }
      }
      init();
    </script>
  </body>
</html>
