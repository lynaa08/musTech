<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produit — Mus Tech</title>
    <script src="api.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap");
      :root {
        --green: #3ecf6e;
        --green-light: #d4f7e2;
        --green-dark: #1fad52;
        --gray-50: #f4f4f5;
        --gray-100: #e8e8ea;
        --gray-300: #b0b0b8;
        --gray-500: #6b6b78;
        --gray-700: #2e2e38;
        --gray-900: #111118;
        --shadow-md: 0 6px 24px rgba(0, 0, 0, 0.09);
        --radius: 14px;
        --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Outfit", system-ui, sans-serif;
        background: #f8fdf9;
        color: var(--gray-900);
        min-height: 100vh;
      }

      nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--gray-100);
        padding: 0 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 64px;
      }
      .nav-logo {
        font-size: 1.2rem;
        font-weight: 900;
        color: var(--gray-900);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .dot {
        width: 8px;
        height: 8px;
        background: var(--green);
        border-radius: 50%;
        display: inline-block;
      }
      .nav-center {
        display: flex;
        gap: 1.5rem;
        align-items: center;
        flex: 1;
        justify-content: center;
        margin: 0 1rem;
      }
      .nav-center a {
        font-size: 0.9rem;
        color: var(--gray-700);
        text-decoration: none;
        font-weight: 500;
        transition: color var(--transition);
      }
      .nav-center a:hover {
        color: var(--green-dark);
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .back-btn {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--gray-50);
        border: 1.5px solid var(--gray-100);
        border-radius: 50px;
        padding: 0.4rem 1.1rem;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--gray-700);
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s;
      }
      .back-btn:hover {
        background: var(--gray-100);
      }
      .icon-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--gray-50);
        border: 1.5px solid var(--gray-100);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition);
        color: var(--gray-700);
      }
      .icon-btn:hover {
        background: var(--green-light);
        border-color: var(--green);
        color: var(--green-dark);
      }
      .icon-btn.favorited {
        background: #ffe0e6;
        border-color: #ff4b6e;
        color: #ff4b6e;
      }

      .page {
        max-width: 1140px;
        margin: 2.5rem auto;
        padding: 0 1.25rem;
      }

      /* TWO COLUMN LAYOUT - RESPONSIVE */
      .card {
        background: #fff;
        border-radius: 20px;
        box-shadow: var(--shadow-md);
        display: grid;
        grid-template-columns: 420px 1fr;
        overflow: hidden;
      }

      /* LEFT IMAGE */
      .img-section {
        background: linear-gradient(135deg, var(--gray-50), var(--green-light));
        position: relative;
        padding: 1.5rem 1.5rem 1.25rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        border-right: 1px solid var(--gray-100);
      }
      .img-wrap {
        width: 100%;
        max-width: 380px;
        aspect-ratio: 1/1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 9rem;
        border-radius: 16px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.65);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
      }
      .img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        padding: 1rem;
      }
      .badge {
        position: absolute;
        top: 14px;
        left: 14px;
        background: var(--green);
        color: #fff;
        font-size: 0.72rem;
        font-weight: 700;
        padding: 0.25rem 0.7rem;
        border-radius: 50px;
        z-index: 2;
      }
      .badge.sale {
        background: #ff4b6e;
      }
      .thumbs {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 0.85rem;
        justify-content: center;
      }
      .thumb {
        width: 56px;
        height: 56px;
        object-fit: cover;
        border-radius: 10px;
        cursor: pointer;
        border: 2px solid transparent;
        transition: 0.2s;
        background: #fff;
      }
      .thumb.active {
        border-color: var(--green);
      }

      /* RIGHT INFO + FORM */
      .info {
        padding: 1.75rem 1.75rem 1.75rem;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
      }
      .cat {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--green-dark);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 0.3rem;
      }
      .pname {
        font-size: 1.55rem;
        font-weight: 900;
        line-height: 1.2;
        margin-bottom: 0.4rem;
      }
      .desc {
        font-size: 0.88rem;
        color: var(--gray-500);
        line-height: 1.65;
        margin-bottom: 0.9rem;
      }

      /* VARIANTS ONLY (NO STOCK DISPLAY) */
      .variants-row {
        display: flex;
        align-items: flex-start;
        flex-direction: column;
        gap: 0.5rem;
        margin-bottom: 1.2rem;
      }
      .vlabel {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--gray-700);
        margin-bottom: 0.35rem;
      }
      .variants {
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
      }
      .vchip {
        padding: 0.35rem 0.85rem;
        border-radius: 50px;
        border: 2px solid var(--gray-100);
        background: #fff;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        color: var(--gray-700);
        transition: var(--transition);
      }
      .vchip.active {
        background: var(--green);
        border-color: var(--green);
        color: #fff;
      }

      .price-section {
        display: flex;
        align-items: baseline;
        gap: 0.6rem;
        margin-bottom: 1rem;
        padding: 0.9rem 0;
        border-bottom: 1px solid var(--gray-100);
      }
      .price-label {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--gray-500);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .price {
        font-size: 1.8rem;
        font-weight: 900;
        color: var(--green-dark);
      }

      .qty-section {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 1.2rem;
      }
      .qty-label {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--gray-700);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .qty-stepper {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        border: 1.5px solid var(--gray-100);
        border-radius: 50px;
        padding: 0.2rem 0.3rem;
        background: var(--gray-50);
      }
      .qty-stepper button {
        width: 28px;
        height: 28px;
        border: none;
        background: transparent;
        cursor: pointer;
        font-size: 1rem;
        color: var(--gray-700);
        transition: color var(--transition);
      }
      .qty-stepper button:hover {
        color: var(--green-dark);
      }
      .qty-stepper input {
        width: 38px;
        border: none;
        background: transparent;
        text-align: center;
        font-weight: 700;
        font-family: inherit;
        font-size: 0.9rem;
      }

      .btn-primary {
        width: 100%;
        padding: 0.85rem 1.5rem;
        background: var(--green);
        color: #fff;
        border: none;
        border-radius: 50px;
        font-weight: 700;
        font-size: 0.95rem;
        cursor: pointer;
        transition: all var(--transition);
        margin-bottom: 0.6rem;
      }
      .btn-primary:hover {
        background: var(--green-dark);
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(62, 207, 110, 0.3);
      }
      .btn-secondary {
        width: 100%;
        padding: 0.85rem 1.5rem;
        background: var(--gray-50);
        color: var(--gray-700);
        border: 1.5px solid var(--gray-100);
        border-radius: 50px;
        font-weight: 700;
        font-size: 0.95rem;
        cursor: pointer;
        transition: all var(--transition);
      }
      .btn-secondary:hover {
        background: var(--gray-100);
        border-color: var(--green);
        color: var(--green-dark);
      }

      /* CHECKOUT STYLES */
      .checkout-section {
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--gray-100);
      }
      .checkout-title {
        font-size: 1rem;
        font-weight: 800;
        margin-bottom: 1rem;
        color: var(--gray-900);
      }
      .form-group {
        margin-bottom: 1.2rem;
      }
      .form-label {
        display: block;
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--gray-700);
        margin-bottom: 0.4rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .form-input,
      .form-select {
        width: 100%;
        padding: 0.7rem 1rem;
        border: 1.5px solid var(--gray-100);
        border-radius: 12px;
        font-family: inherit;
        font-size: 0.95rem;
        transition: all var(--transition);
      }
      .form-input:focus,
      .form-select:focus {
        outline: none;
        border-color: var(--green);
        box-shadow: 0 0 0 3px var(--green-light);
      }
      .shipping-options {
        display: flex;
        gap: 1rem;
        margin-bottom: 1rem;
      }
      .shipping-option {
        flex: 1;
        padding: 0.8rem;
        border: 2px solid var(--gray-100);
        border-radius: 12px;
        cursor: pointer;
        text-align: center;
        transition: all var(--transition);
        font-weight: 600;
        font-size: 0.85rem;
      }
      .shipping-option.active {
        border-color: var(--green);
        background: var(--green-light);
        color: var(--green-dark);
      }

      .delivery-price {
        background: var(--green-light);
        border-left: 4px solid var(--green);
        padding: 0.9rem;
        border-radius: 8px;
        margin: 1rem 0;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--green-dark);
      }

      .order-summary {
        background: var(--gray-50);
        border-radius: 12px;
        padding: 1.2rem;
        margin-bottom: 1.2rem;
      }
      .orow {
        display: flex;
        justify-content: space-between;
        font-size: 0.9rem;
        margin-bottom: 0.6rem;
      }
      .orow.total {
        font-weight: 800;
        font-size: 1rem;
        padding-top: 0.6rem;
        border-top: 1px solid var(--gray-100);
        margin-bottom: 0;
        color: var(--green-dark);
      }

      /* CART PANEL */
      .cart-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        z-index: 999;
      }
      .cart-overlay.open {
        display: block;
      }
      .cart-panel {
        position: fixed;
        right: -400px;
        top: 0;
        width: 400px;
        height: 100vh;
        background: #fff;
        box-shadow: -4px 0 16px rgba(0, 0, 0, 0.1);
        transition: right var(--transition);
        z-index: 1000;
        display: flex;
        flex-direction: column;
      }
      .cart-panel.open {
        right: 0;
      }
      .cart-header {
        padding: 1.2rem;
        border-bottom: 1px solid var(--gray-100);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .cart-header h2 {
        font-size: 1rem;
      }
      .cart-close {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--gray-700);
      }
      .cart-items {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
      }
      .cart-item {
        padding: 0.9rem;
        border: 1px solid var(--gray-100);
        border-radius: 12px;
        margin-bottom: 0.8rem;
        font-size: 0.85rem;
      }
      .cart-footer {
        padding: 1.2rem;
        border-top: 1px solid var(--gray-100);
      }
      .cart-total {
        font-weight: 800;
        font-size: 1.1rem;
        margin-bottom: 1rem;
      }

      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: var(--gray-900);
        color: #fff;
        padding: 1rem 1.5rem;
        border-radius: 50px;
        font-size: 0.9rem;
        font-weight: 600;
        opacity: 0;
        transform: translateY(20px);
        transition: all var(--transition);
        pointer-events: none;
        z-index: 2000;
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .success-box {
        background: var(--green-light);
        border: 2px solid var(--green);
        border-radius: 16px;
        padding: 2rem;
        text-align: center;
        margin: 2rem auto;
        max-width: 500px;
        opacity: 0;
        transform: scale(0.9);
        transition: all var(--transition);
        pointer-events: none;
      }
      .success-box.show {
        opacity: 1;
        transform: scale(1);
        pointer-events: auto;
      }

      /* MOBILE RESPONSIVE */
      @media (max-width: 960px) {
        nav {
          padding: 0 0.75rem;
        }
        .nav-center {
          gap: 0.75rem;
          margin: 0 0.5rem;
        }
        .nav-center a {
          font-size: 0.8rem;
          display: none;
        }
        .card {
          grid-template-columns: 1fr;
        }
        .img-section {
          border-right: none;
          border-bottom: 1px solid var(--gray-100);
          padding: 1.25rem;
        }
        .img-wrap {
          max-width: 300px;
          font-size: 6rem;
        }
        .pname {
          font-size: 1.3rem;
        }
        .price {
          font-size: 1.5rem;
        }
        .cart-panel {
          width: 100%;
          right: -100%;
        }
      }

      @media (max-width: 600px) {
        nav {
          height: 56px;
          padding: 0 0.5rem;
        }
        .nav-logo {
          font-size: 1rem;
        }
        .nav-center {
          gap: 0.5rem;
          margin: 0 0.25rem;
        }
        .nav-center a {
          font-size: 0.75rem;
        }
        .page {
          margin: 1.5rem auto;
          padding: 0 0.75rem;
        }
        .card {
          border-radius: 12px;
        }
        .img-section {
          padding: 1rem;
        }
        .img-wrap {
          max-width: 200px;
          font-size: 4rem;
        }
        .thumb {
          width: 48px;
          height: 48px;
        }
        .info {
          padding: 1.25rem;
        }
        .pname {
          font-size: 1.1rem;
          margin-bottom: 0.6rem;
        }
        .desc {
          font-size: 0.8rem;
          margin-bottom: 0.8rem;
        }
        .price {
          font-size: 1.3rem;
        }
        /* Variant rows responsive */
        #variants-rows-container > div {
          flex-direction: column;
          align-items: flex-start;
        }
        #variants-rows-container > div > div:first-child {
          width: 100%;
          margin-bottom: 0.8rem;
        }
        #variants-rows-container > div > div:last-child {
          width: 100%;
          justify-content: space-between;
        }
        .variants {
          gap: 0.3rem;
        }
        .vchip {
          padding: 0.3rem 0.7rem;
          font-size: 0.75rem;
        }
        .btn-primary,
        .btn-secondary {
          padding: 0.7rem 1.2rem;
          font-size: 0.85rem;
        }
        .checkout-section {
          margin-top: 1.5rem;
          padding-top: 1rem;
        }
        .form-input,
        .form-select {
          padding: 0.6rem 0.8rem;
          font-size: 0.9rem;
        }
        .shipping-options {
          gap: 0.5rem;
        }
        .shipping-option {
          padding: 0.6rem;
          font-size: 0.75rem;
        }
        .toast {
          bottom: 10px;
          right: 10px;
          left: 10px;
          font-size: 0.85rem;
        }
        .success-box {
          padding: 1.5rem;
          margin: 1.5rem 1rem;
        }
      }

      @media (max-width: 400px) {
        .nav-logo {
          font-size: 0.9rem;
        }
        .icon-btn {
          width: 36px;
          height: 36px;
        }
        .pname {
          font-size: 1rem;
        }
        .variants {
          gap: 0.2rem;
        }
        .vchip {
          padding: 0.25rem 0.6rem;
          font-size: 0.7rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav>
      <a href="/" class="nav-logo">
        Mus <span>Tech</span><span class="dot"></span>
      </a>
      <div class="nav-center">
        <a
          href="index.html"
          onclick="sessionStorage.setItem('openModal', 'login-modal')"
          style="
            font-size: 0.9rem;
            color: var(--gray-700);
            text-decoration: none;
            font-weight: 500;
          "
          >Connexion</a
        >
        <a
          href="index.html"
          onclick="sessionStorage.setItem('openModal', 'my-orders')"
          style="
            font-size: 0.9rem;
            color: var(--gray-700);
            text-decoration: none;
            font-weight: 500;
          "
          >Mes Commandes</a
        >
        <a
          href="index.html"
          onclick="sessionStorage.setItem('goPage', 'favorites')"
          style="
            font-size: 0.9rem;
            color: var(--gray-700);
            text-decoration: none;
            font-weight: 500;
          "
          >❤️ Favoris</a
        >
      </div>
      <div class="nav-actions">
        <button class="icon-btn" id="fav-btn" title="Ajouter aux favoris">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
          </svg>
        </button>
        <button class="back-btn" onclick="window.location.href = 'index.html'">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12" />
            <polyline points="12 19 5 12 12 5" />
          </svg>
          Retour
        </button>
      </div>
    </nav>

    <!-- PAGE CONTENT -->
    <div class="page">
      <div class="card">
        <!-- LEFT: IMAGE -->
        <div class="img-section">
          <div class="img-wrap">
            <img id="main-img" src="" alt="Produit" />
          </div>
          <div class="thumbs" id="thumbs-container"></div>
        </div>

        <!-- RIGHT: INFO & FORM -->
        <div class="info">
          <div class="cat" id="product-category">Catégorie</div>
          <h1 class="pname" id="product-name">Nom du produit</h1>
          <p class="desc" id="product-desc">Description</p>

          <!-- VARIANTS SECTION - ROWS -->
          <div style="margin-bottom: 1.5rem">
            <h3
              style="
                font-size: 0.9rem;
                font-weight: 700;
                margin-bottom: 1rem;
                color: var(--gray-900);
              ">
              Choisir les options & quantités
            </h3>
            <div id="variants-rows-container"></div>
          </div>

          <!-- PRICE -->
          <div
            style="
              margin-bottom: 1.5rem;
              padding: 1rem 0;
              border-bottom: 1px solid var(--gray-100);
            ">
            <div style="display: flex; align-items: center; gap: 1rem">
              <div>
                <div
                  style="
                    font-size: 1.8rem;
                    font-weight: 900;
                    color: var(--green-dark);
                  "
                  id="product-price">
                  0 DA
                </div>
              </div>
              <div style="display: flex; gap: 0.5rem; align-items: center">
                <span
                  style="
                    font-size: 0.85rem;
                    color: var(--gray-500);
                    text-decoration: line-through;
                  "
                  id="old-price"
                  style="display: none"
                  >15 DA</span
                >
                <span
                  style="
                    background: #fff4e6;
                    color: #ff9500;
                    padding: 0.25rem 0.6rem;
                    border-radius: 50px;
                    font-size: 0.75rem;
                    font-weight: 700;
                  "
                  id="discount-badge"
                  style="display: none"
                  >-40%</span
                >
              </div>
            </div>
          </div>

          <!-- LIVRAISON PRIX -->
          <div
            style="
              background: var(--green-light);
              border-left: 4px solid var(--green);
              padding: 1rem;
              border-radius: 8px;
              margin-bottom: 1.5rem;
              display: none;
            "
            id="livraison-section">
            <div
              style="
                display: flex;
                justify-content: space-between;

    <!-- TOAST -->

    <script>
      let product = null;
      let currentVariant = 0;
      let currentQty = 1;
      let cart = [];
      let variantQtys = [];
      let deliveryType = "home";
      let favoriteProducts = JSON.parse(
        localStorage.getItem("mt_favorites") || "[]",
      );

      // Load product from URL
      async function loadProduct() {
        const params = new URLSearchParams(window.location.search);
        const id = parseInt(params.get("id"));
        if (!id) return;

        try {
          const products = await ProductsAPI.getAll();
          const wilayas = await WilayasAPI.getAll();

          const raw = products.find((p) => p.id === id);
          if (!raw) {
            showToast("Produit introuvable");
            return;
          }

          // Normalize: handle both camelCase (API normalized) and snake_case (raw DB)
          product = {
            ...raw,
            cat: raw.cat || raw.category || "",
            desc: raw.desc || raw.description || "",
            img: raw.img || raw.image || "",
            images:
              raw.images ||
              (raw.img ? [raw.img] : raw.image ? [raw.image] : []),
            variants: raw.variants || ["Standard"],
            variantPrices: raw.variantPrices ||
              raw.variant_prices || [raw.price || 0],
          };
          // Ensure variantPrices is always an array of numbers
          if (typeof product.variantPrices === "string") {
            try {
              product.variantPrices = JSON.parse(product.variantPrices);
            } catch (e) {
              product.variantPrices = [product.price || 0];
            }
          }
          if (typeof product.variants === "string") {
            try {
              product.variants = JSON.parse(product.variants);
            } catch (e) {
              product.variants = ["Standard"];
            }
          }

          // Build wilaya select from real API data
          const sel = document.getElementById("co-wilaya");
          if (sel) {
            sel.innerHTML = '<option value="">Sélectionnez une wilaya</option>';
            wilayas.forEach((w) => {
              const price = w.shipping_price ?? w.price ?? 0;
              const o = document.createElement("option");
              o.value = price;
              o.dataset.name = w.name;
              o.textContent = w.name + " — " + price + " DA";
              sel.appendChild(o);
            });
            sel.addEventListener("change", () => updateOrderSummaryFromCart());
          }

          renderProduct();
          updateFavBtn();
          updateOrderSummaryFromCart();
          updateDeliveryDetails();
        } catch (e) {
          console.error(e);
          showToast("Erreur de chargement du produit");
        }
      }

      function renderProduct() {
        if (!product) return;

        document.getElementById("product-category").textContent =
          product.cat || "Catégorie";
        document.getElementById("product-name").textContent = product.name;
        document.getElementById("product-desc").textContent =
          product.desc || product.description || "";

        // Support both single img and images array
        const mainImgEl = document.getElementById("main-img");
        const firstImg =
          product.images && product.images.length > 0
            ? product.images[0]
            : product.img || "";
        if (firstImg) {
          mainImgEl.src = firstImg;
          mainImgEl.style.display = "";
        } else {
          mainImgEl.style.display = "none";
          // Show emoji icon as fallback
          const imgWrap = mainImgEl.closest(".img-wrap");
          if (imgWrap && product.icon) {
            const iconSpan = document.createElement("span");
            iconSpan.textContent = product.icon;
            iconSpan.style.fontSize = "7rem";
            imgWrap.appendChild(iconSpan);
          }
        }

        // Render variants as rows with prices
        const varContainer = document.getElementById("variants-rows-container");
        variantQtys = new Array(product.variants.length).fill(0);

        varContainer.innerHTML = product.variants
          .map((v, i) => {
            const price = product.variantPrices[i] ?? product.variantPrices[0];
            return `
                  <div style="display:flex;justify-content:space-between;align-items:center;padding:1rem;border:1px solid var(--gray-100);border-radius:12px;margin-bottom:0.8rem;flex-wrap:wrap;gap:0.8rem;">
                    <div style="flex:1;min-width:120px;">
                      <div style="font-weight:700;color:var(--gray-900);margin-bottom:0.4rem;">${v}</div>
                      <div style="font-size:0.9rem;color:var(--green-dark);font-weight:700;">${price.toLocaleString()} DA</div>
                    </div>
                    <div style="display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;">
                      <div style="display:flex;align-items:center;gap:0.4rem;border:1px solid var(--gray-100);border-radius:50px;padding:0.3rem;">
                        <button onclick="changeVariantQty(${i},-1)" style="width:28px;height:28px;border:none;background:transparent;cursor:pointer;font-weight:700;">−</button>
                        <input type="number" value="0" data-variant="${i}" style="width:40px;text-align:center;border:none;background:transparent;font-weight:600;" readonly>
                        <button onclick="changeVariantQty(${i},1)" style="width:28px;height:28px;border:none;background:transparent;cursor:pointer;font-weight:700;">+</button>
                      </div>
                      <div style="background:var(--green-light);color:var(--green-dark);padding:0.35rem 0.8rem;border-radius:50px;font-size:0.75rem;font-weight:700;white-space:nowrap;">
                        ✓ En stock
                      </div>
                    </div>
                  </div>
                `;
          })
          .join("");

        updateTotalPrice();

        // Thumbnails
        const thumbsContainer = document.getElementById("thumbs-container");
        const allImages =
          product.images && product.images.length > 0
            ? product.images
            : product.img
              ? [product.img]
              : [];
        thumbsContainer.innerHTML =
          allImages.length > 1
            ? allImages
                .map(
                  (img, i) =>
                    `<img class="thumb ${i === 0 ? "active" : ""}" src="${img}" onclick="changeImage(${i})">`,
                )
                .join("")
            : "";
      }

      function selectVariant(idx) {
        currentVariant = idx;
        document.querySelectorAll(".vchip").forEach((el, i) => {
          el.classList.toggle("active", i === idx);
        });
        updatePrice();
      }

      function changeVariantQty(idx, delta) {
        variantQtys[idx] = Math.max(0, variantQtys[idx] + delta);
        document.querySelector(`input[data-variant="${idx}"]`).value =
          variantQtys[idx];
        updateTotalPrice();
      }

      function updateTotalPrice() {
        let total = 0;
        product.variants.forEach((v, i) => {
          const price = product.variantPrices[i] ?? product.variantPrices[0];
          total += price * variantQtys[i];
        });

        const priceEl = document.getElementById("product-price");
        if (total > 0) {
          priceEl.textContent = total.toLocaleString() + " DA";
        } else {
          priceEl.textContent =
            product.variantPrices[0].toLocaleString() + " DA";
        }
        updateOrderSummaryFromCart();
      }

      function updatePrice() {
        if (!product) return;
        const price =
          product.variantPrices[currentVariant] ?? product.variantPrices[0];
        document.getElementById("product-price").textContent =
          price.toLocaleString() + " DA";
      }

      function changeImage(idx) {
        const allImages =
          product.images && product.images.length > 0
            ? product.images
            : product.img
              ? [product.img]
              : [];
        if (allImages.length > 0) {
          document.getElementById("main-img").src =
            allImages[idx] || allImages[0];
          document.querySelectorAll(".thumb").forEach((el, i) => {
            el.classList.toggle("active", i === idx);
          });
        }
      }

      function qtyInc() {
        currentQty++;
        document.getElementById("qty-input").value = currentQty;
      }

      function qtyDec() {
        if (currentQty > 1) {
          currentQty--;
          document.getElementById("qty-input").value = currentQty;
        }
      }

      // FAVORITES
      function toggleFavorite() {
        if (!product) return;
        const idx = favoriteProducts.findIndex((p) => p.id === product.id);
        if (idx >= 0) {
          favoriteProducts.splice(idx, 1);
        } else {
          favoriteProducts.push({
            id: product.id,
            name: product.name,
            image: product.img || product.image || "",
          });
        }
        localStorage.setItem("mt_favorites", JSON.stringify(favoriteProducts));
        updateFavBtn();
        showToast(idx >= 0 ? "Supprimé des favoris" : "Ajouté aux favoris");
      }

      function updateFavBtn() {
        const btn = document.getElementById("fav-btn");
        const isFav = favoriteProducts.some((p) => p.id === product?.id);
        btn.classList.toggle("favorited", isFav);
        btn.onclick = toggleFavorite;
      }

      function showCheckoutForm() {
        document.getElementById("checkout-form").style.display = "block";
        updateOrderSummaryFromCart();
        updateDeliveryDetails();
        document
          .getElementById("checkout-form")
          .scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function addCurrentToCart() {
        if (!product) return;
        cart.push({
          productData: product,
          variantIndex: currentVariant,
          qty: currentQty,
        });
        updateCartUI();
        showToast(`${product.name} ajouté au panier`);
        openCart();
      }

      function updateCartUI() {
        const list = document.getElementById("cart-items-list");
        const footer = document.getElementById("cart-footer");

        if (cart.length === 0) {
          list.innerHTML =
            '<p style="color:var(--gray-500);text-align:center;padding:2rem 1rem;">Votre panier est vide</p>';
          footer.style.display = "none";
          return;
        }

        list.innerHTML = cart
          .map((item, idx) => {
            const p = item.productData;
            const price =
              (p.variantPrices[item.variantIndex] ?? p.variantPrices[0]) *
              item.qty;
            return `
                    <div class="cart-item">
                      <div style="display:flex;justify-content:space-between;margin-bottom:0.6rem;">
                        <strong>${p.name}</strong>
                        <button onclick="cartRemove(${idx})" style="background:none;border:none;cursor:pointer;color:var(--gray-500);">✕</button>
                      </div>
                      <div style="font-size:0.8rem;color:var(--gray-500);margin-bottom:0.4rem;">
                        ${p.variants[item.variantIndex] || "Standard"}
                      </div>
                      <div style="display:flex;justify-content:space-between;align-items:center;">
                        <div style="display:flex;gap:0.3rem;">
                          <button onclick="cartChangeQty(${idx},-1)" style="width:24px;height:24px;border:none;background:var(--gray-50);cursor:pointer;border-radius:4px;">−</button>
                          <span style="width:32px;text-align:center;font-weight:600;">${item.qty}</span>
                          <button onclick="cartChangeQty(${idx},1)" style="width:24px;height:24px;border:none;background:var(--gray-50);cursor:pointer;border-radius:4px;">+</button>
                        </div>
                        <strong>${price.toLocaleString()} DA</strong>
                      </div>
                    </div>
                  `;
          })
          .join("");

        document.getElementById("cp-totals").innerHTML = `
                <div class="orow"><span>Sous-total</span><span>${cartTotal().toLocaleString()} DA</span></div>
                <div class="orow" style="font-size:0.75rem;color:var(--gray-500);"><span>Livraison calculée à l'étape suivante</span></div>`;
        footer.style.display = "";
      }

      function cartTotal() {
        return cart.reduce((sum, item) => {
          const price =
            item.productData.variantPrices[item.variantIndex] ??
            item.productData.variantPrices[0];
          return sum + price * item.qty;
        }, 0);
      }

      function cartChangeQty(idx, delta) {
        cart[idx].qty = Math.max(1, cart[idx].qty + delta);
        updateCartUI();
      }

      function cartRemove(idx) {
        cart.splice(idx, 1);
        updateCartUI();
      }

      function openCart() {
        document.getElementById("cart-overlay").classList.add("open");
        document.getElementById("cart-panel").classList.add("open");
        document.body.style.overflow = "hidden";
      }

      function closeCart() {
        document.getElementById("cart-overlay").classList.remove("open");
        document.getElementById("cart-panel").classList.remove("open");
        document.body.style.overflow = "";
      }

      function setDeliveryType(type, el) {
        deliveryType = type;
        document.querySelectorAll(".shipping-option").forEach((btn) => {
          btn.classList.remove("active");
        });
        if (el) el.classList.add("active");
        updateDeliveryDetails();
        updateOrderSummaryFromCart();
      }

      function updateDeliveryDetails() {
        const details = document.getElementById("delivery-details");
        if (deliveryType === "home") {
          details.innerHTML = `
                  <div class="form-group">
                    <label class="form-label">Adresse de Livraison</label>
                    <input type="text" id="co-address" class="form-input" placeholder="Rue, Quartier...">
                  </div>
                `;
        } else {
          details.innerHTML = `
                  <div class="form-group">
                    <label class="form-label">Société de livraison</label>
                    <select id="co-company" class="form-select" onchange="loadBureauOffices()">
                      <option value="">Sélectionnez une société</option>
                      <option value="yalidine">Yalidine Express</option>
                      <option value="zaki">Zaki Express</option>
                      <option value="procolis">Procolis</option>
                      <option value="noest">Noest Express</option>
                      <option value="eship">eShip</option>
                      <option value="maystro">Maystro Delivery</option>
                      <option value="dhlex">DHlex</option>
                      <option value="guepex">Guepex</option>
                    </select>

      function loadBureauOffices() {
        const company = document.getElementById("co-company")?.value;
        const group = document.getElementById("bureau-office-group");
        const officeSelect = document.getElementById("co-office");
        if (!company || !group || !officeSelect) return;
        if (!company) {
          group.style.display = "none";
          return;
        }
        group.style.display = "block";
        officeSelect.innerHTML =
          '<option value="">Sélectionnez un bureau</option>';
        (BUREAU_OFFICES[company] || []).forEach((office) => {
          const o = document.createElement("option");
          o.value = office;
          o.textContent = office;
          officeSelect.appendChild(o);
        });
      }

      function proceedToCheckout() {
        closeCart();
        document.getElementById("checkout-form").style.display = "block";
        updateOrderSummaryFromCart();
        updateDeliveryDetails();
        document
          .getElementById("checkout-form")
          .scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function updateOrderSummaryFromCart() {
        const summary = document.getElementById("order-summary-mini");
        const sel = document.getElementById("co-wilaya");
        const shipping = sel ? parseInt(sel.value) || 0 : 0;
        const wilayaName =
          sel && sel.selectedIndex > 0
            ? sel.options[sel.selectedIndex].dataset.name
            : "—";
        const typeLabel =
          deliveryType === "bureau" ? "Au Bureau" : "À Domicile";

        // Build items from selected variants
        let itemsHtml = "";
        let subtotal = 0;

        if (product && variantQtys) {
          product.variants.forEach((variant, idx) => {
            const qty = variantQtys[idx];
            if (qty > 0) {
              const price =
                product.variantPrices[idx] ?? product.variantPrices[0];
              const itemTotal = price * qty;
              subtotal += itemTotal;
              itemsHtml += `<div class="orow"><span>${product.name} (${variant}) ×${qty}</span><span>${itemTotal.toLocaleString()} DA</span></div>`;
            }
          });
        }

        if (itemsHtml === "") {
          itemsHtml = `<div class="orow" style="color:var(--gray-500);"><span>Aucun produit sélectionné</span></div>`;
        }

        summary.innerHTML =
          itemsHtml +
          `<div class="orow"><span>Livraison ${typeLabel} (${wilayaName})</span><span>${shipping ? shipping.toLocaleString() + " DA" : "—"}</span></div>
                 <div class="orow total"><span>Total</span><span>${(subtotal + shipping).toLocaleString()} DA</span></div>`;

        // Show livraison section if wilaya is selected
        const livraisonSection = document.getElementById("livraison-section");
        if (shipping > 0) {
          livraisonSection.style.display = "block";
          document.getElementById("livraison-prix-display").textContent =
            shipping.toLocaleString() + " DA";
        }
      }

      function showToast(msg) {
        const toast = document.getElementById("toast-msg");
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 3000);
      }

      async function placeOrder() {
        const name = document.getElementById("co-name").value.trim();
        const phone = document.getElementById("co-phone").value.trim();
        const wilEl = document.getElementById("co-wilaya");
        const wilaya = wilEl.options[wilEl.selectedIndex]?.dataset.name || "";

        if (!phone || !wilaya) {
          showToast("Téléphone et Wilaya sont obligatoires");
          return;
        }

        let address = "";
        if (deliveryType === "bureau") {
          const compEl = document.getElementById("co-company");
          const offEl = document.getElementById("co-office");
          const company = compEl?.options[compEl.selectedIndex]?.text || "";
          const office = offEl?.value || "";
          if (!company || !office) {
            showToast("Choisissez la société et le bureau");
            return;
          }
          address = "Bureau — " + company + " — " + office;
        } else {
          address =
            "Domicile — " +
            (document.getElementById("co-address").value.trim() || "—");
        }

        let itemsToOrder;
        // Use variantQtys if any are > 0, otherwise fallback to currentVariant
        const hasSelectedVariants =
          variantQtys && variantQtys.some((q) => q > 0);
        if (hasSelectedVariants) {
          itemsToOrder = variantQtys
            .map((qty, i) => ({ id: product.id, variant: i, qty }))
            .filter((item) => item.qty > 0);
        } else if (cart.length > 0) {
          itemsToOrder = cart.map((i) => ({
            id: i.productData.id,
            variant: i.variantIndex,
            qty: i.qty,
          }));
        } else {
          itemsToOrder = [
            {
              id: product.id,
              variant: currentVariant,
              qty: Math.max(1, currentQty),
            },
          ];
        }

        const orderData = {
          customer: name || phone,
          phone,
          wilaya,
          address,
          note: document.getElementById("co-note").value.trim(),
          items: itemsToOrder,
        };

        const btn = document.getElementById("confirm-btn");
        btn.disabled = true;
        btn.innerHTML =
          '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="animation:spin 0.8s linear infinite"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> En cours...';

        try {
          const result = await OrdersAPI.place(orderData);

          document.getElementById("checkout-form").style.display = "none";
          const box = document.getElementById("success-box");
          box.innerHTML = `
                  <div style="color:var(--green-dark);margin-bottom:0.75rem;"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg></div>
                  <h2 style="color:var(--green-dark);margin-bottom:0.4rem;font-size:1.2rem;">Commande confirmée !</h2>
                  <p style="color:var(--gray-700);font-size:0.9rem;margin-bottom:0.3rem;">Merci <strong>${orderData.customer}</strong>, nous vous contacterons au <strong>${phone}</strong>.</p>
                  <p style="color:var(--green-dark);font-weight:800;font-size:1.05rem;margin:0.6rem 0;">${result.order_ref || "#MT-" + result.id}</p>
                  <p style="font-size:0.82rem;color:var(--gray-500);margin-bottom:1rem;">${address}</p>
                  <a href="/" style="display:inline-block;padding:0.65rem 1.75rem;background:var(--green);color:#fff;border-radius:50px;font-weight:700;text-decoration:none;font-size:0.9rem;">Retour à la boutique</a>
                `;
          box.classList.add("show");
          box.scrollIntoView({ behavior: "smooth", block: "center" });
          cart = [];
