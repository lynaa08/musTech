<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produit — Mus Tech</title>
    <script src="api.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap");
      :root {
        --green: #3ecf6e;
        --green-light: #d4f7e2;
        --green-dark: #1fad52;
        --gray-50: #f4f4f5;
        --gray-100: #e8e8ea;
        --gray-300: #b0b0b8;
        --gray-500: #6b6b78;
        --gray-700: #2e2e38;
        --gray-900: #111118;
        --shadow-md: 0 6px 24px rgba(0, 0, 0, 0.09);
        --radius: 14px;
        --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Outfit", system-ui, sans-serif;
        background: #f8fdf9;
        color: var(--gray-900);
        min-height: 100vh;
      }

      /* NAV */
      nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--gray-100);
        padding: 0 1.25rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 64px;
      }
      .nav-logo {
        font-size: 1.25rem;
        font-weight: 900;
        color: var(--gray-900);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .nav-logo .dot {
        width: 8px;
        height: 8px;
        background: var(--green);
        border-radius: 50%;
        display: inline-block;
      }
      .nav-center {
        display: flex;
        gap: 1.5rem;
        align-items: center;
        flex: 1;
        justify-content: center;
        margin: 0 1rem;
      }
      .nav-center a {
        font-size: 0.9rem;
        color: var(--gray-700);
        text-decoration: none;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        transition: color var(--transition);
      }
      .nav-center a:hover {
        color: var(--green-dark);
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .back-btn {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--gray-50);
        border: 1.5px solid var(--gray-100);
        border-radius: 50px;
        padding: 0.4rem 1.1rem;
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--gray-700);
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s;
        font-family: inherit;
      }
      .back-btn:hover {
        background: var(--gray-100);
      }
      .icon-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--gray-50);
        border: 1.5px solid var(--gray-100);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition);
        color: var(--gray-500);
      }
      .icon-btn:hover {
        background: var(--green-light);
        border-color: var(--green);
        color: var(--green-dark);
      }
      .icon-btn.favorited {
        background: #ffe0e6;
        border-color: #ff4b6e;
        color: #ff4b6e;
      }

      /* SKELETON */
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
      .skel {
        background: linear-gradient(
          90deg,
          var(--gray-100) 25%,
          var(--gray-50) 50%,
          var(--gray-100) 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 8px;
      }

      .page {
        max-width: 1140px;
        margin: 2.5rem auto;
        padding: 0 1.25rem;
      }

      .card {
        background: #fff;
        border-radius: 20px;
        box-shadow: var(--shadow-md);
        display: grid;
        grid-template-columns: 420px 1fr;
        overflow: hidden;
      }

      /* IMAGE SECTION */
      .img-section {
        background: linear-gradient(135deg, var(--gray-50), var(--green-light));
        position: relative;
        padding: 1.5rem 1.5rem 1.25rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        border-right: 1px solid var(--gray-100);
      }
      .img-wrap {
        width: 100%;
        max-width: 380px;
        aspect-ratio: 1/1;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.65);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
        position: relative;
      }
      .img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        padding: 1rem;
      }
      .img-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--gray-300);
      }
      .thumbs {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 0.85rem;
        justify-content: center;
      }
      .thumb {
        width: 56px;
        height: 56px;
        object-fit: cover;
        border-radius: 10px;
        cursor: pointer;
        border: 2px solid transparent;
        transition: 0.2s;
        background: #fff;
      }
      .thumb.active {
        border-color: var(--green);
      }

      /* INFO */
      .info {
        padding: 1.75rem;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
      }
      .cat-label {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--green-dark);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 0.3rem;
      }
      .pname {
        font-size: 1.5rem;
        font-weight: 900;
        line-height: 1.2;
        margin-bottom: 0.4rem;
      }
      .desc {
        font-size: 0.88rem;
        color: var(--gray-500);
        line-height: 1.65;
        margin-bottom: 0.9rem;
      }

      /* FORM */
      .form-group {
        margin-bottom: 1.1rem;
      }
      .form-label {
        display: block;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--gray-700);
        margin-bottom: 0.4rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .form-input,
      .form-select {
        width: 100%;
        padding: 0.65rem 0.9rem;
        border: 1.5px solid var(--gray-100);
        border-radius: 10px;
        font-family: inherit;
        font-size: 0.9rem;
        transition: all var(--transition);
        background: #fff;
        color: var(--gray-900);
      }
      .form-input:focus,
      .form-select:focus {
        outline: none;
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(62, 207, 110, 0.12);
      }
      .shipping-options {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 0.9rem;
      }
      .shipping-option {
        flex: 1;
        padding: 0.7rem;
        border: 2px solid var(--gray-100);
        border-radius: 10px;
        cursor: pointer;
        text-align: center;
        transition: all var(--transition);
        font-weight: 600;
        font-size: 0.82rem;
        font-family: inherit;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
      }
      .shipping-option.active {
        border-color: var(--green);
        background: var(--green-light);
        color: var(--green-dark);
      }

      .order-summary {
        background: var(--gray-50);
        border-radius: 10px;
        padding: 1rem 1.1rem;
        margin-bottom: 1rem;
      }
      .orow {
        display: flex;
        justify-content: space-between;
        font-size: 0.88rem;
        margin-bottom: 0.5rem;
        color: var(--gray-700);
      }
      .orow.total {
        font-weight: 800;
        font-size: 0.95rem;
        padding-top: 0.5rem;
        border-top: 1px solid var(--gray-100);
        margin-bottom: 0;
        color: var(--green-dark);
      }

      .btn-primary {
        width: 100%;
        padding: 0.85rem 1.5rem;
        background: var(--green);
        color: #fff;
        border: none;
        border-radius: 50px;
        font-weight: 700;
        font-size: 0.95rem;
        cursor: pointer;
        transition: all var(--transition);
        margin-bottom: 0.5rem;
        font-family: inherit;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }
      .btn-primary:hover {
        background: var(--green-dark);
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(62, 207, 110, 0.3);
      }
      .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .checkout-section {
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--gray-100);
      }
      .checkout-title {
        font-size: 0.95rem;
        font-weight: 800;
        margin-bottom: 1rem;
        color: var(--gray-900);
      }

      /* PRICE SECTION */
      .price-section {
        margin-bottom: 1.25rem;
        padding: 0.9rem 0;
        border-bottom: 1px solid var(--gray-100);
      }
      .price-val {
        font-size: 1.8rem;
        font-weight: 900;
        color: var(--green-dark);
      }
      .price-old {
        font-size: 0.85rem;
        color: var(--gray-300);
        text-decoration: line-through;
        margin-left: 0.5rem;
      }

      /* LIVRAISON INFO */
      .livraison-info {
        background: var(--green-light);
        border-left: 4px solid var(--green);
        padding: 0.9rem 1rem;
        border-radius: 8px;
        margin-bottom: 1.25rem;
        display: none;
      }
      .livraison-info .lv-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.3rem;
      }
      .livraison-info .lv-label {
        font-weight: 700;
        color: var(--green-dark);
        font-size: 0.88rem;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .livraison-info .lv-price {
        font-weight: 800;
        color: var(--green-dark);
        font-size: 1.05rem;
      }
      .livraison-info .lv-sub {
        font-size: 0.72rem;
        color: var(--green-dark);
        opacity: 0.8;
      }

      /* SUCCESS */
      .success-box {
        background: var(--green-light);
        border: 2px solid var(--green);
        border-radius: 20px;
        padding: 2.5rem 2rem;
        text-align: center;
        margin: 1rem 0;
        display: none;
      }
      .success-box.show {
        display: block;
      }
      .success-ref-badge {
        background: #fff;
        border: 2px solid var(--green);
        border-radius: 10px;
        padding: 0.6rem 1.5rem;
        display: inline-block;
        margin: 0.75rem 0;
      }

      /* TOAST */
      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: var(--gray-900);
        color: #fff;
        padding: 0.9rem 1.4rem;
        border-radius: 50px;
        font-size: 0.88rem;
        font-weight: 600;
        opacity: 0;
        transform: translateY(20px);
        transition: all var(--transition);
        pointer-events: none;
        z-index: 2000;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      /* VARIANT ROW */
      .variant-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.9rem 1rem;
        border: 1.5px solid var(--gray-100);
        border-radius: 12px;
        margin-bottom: 0.75rem;
        flex-wrap: wrap;
        gap: 0.75rem;
        transition: border-color 0.2s;
      }
      .variant-row:hover {
        border-color: var(--green-light);
      }
      .variant-name {
        font-weight: 700;
        color: var(--gray-900);
        margin-bottom: 0.2rem;
        font-size: 0.92rem;
      }
      .variant-price {
        font-size: 0.88rem;
        color: var(--green-dark);
        font-weight: 700;
      }
      .qty-ctrl {
        display: flex;
        align-items: center;
        gap: 0.3rem;
        border: 1.5px solid var(--gray-100);
        border-radius: 50px;
        padding: 0.2rem 0.3rem;
        background: var(--gray-50);
      }
      .qty-btn {
        width: 28px;
        height: 28px;
        border: none;
        background: transparent;
        cursor: pointer;
        font-weight: 700;
        font-size: 1rem;
        color: var(--gray-700);
        transition: color 0.2s;
        line-height: 1;
      }
      .qty-btn:hover {
        color: var(--green-dark);
      }
      .qty-input {
        width: 36px;
        text-align: center;
        border: none;
        background: transparent;
        font-weight: 700;
        font-size: 0.88rem;
        color: var(--gray-900);
      }

      /* RESPONSIVE */
      @media (max-width: 960px) {
        .card {
          grid-template-columns: 1fr;
        }
        .img-section {
          border-right: none;
          border-bottom: 1px solid var(--gray-100);
        }
        .img-wrap {
          max-width: 300px;
        }
        .nav-center a span {
          display: none;
        }
      }
      @media (max-width: 600px) {
        .page {
          margin: 1rem auto;
          padding: 0 0.75rem;
        }
        .info {
          padding: 1.25rem;
        }
        .pname {
          font-size: 1.15rem;
        }
        .toast {
          bottom: 10px;
          right: 10px;
          left: 10px;
        }
        .nav-center {
          gap: 0.75rem;
        }
        .shipping-options {
          gap: 0.5rem;
        }
        .shipping-option {
          font-size: 0.75rem;
          padding: 0.55rem 0.4rem;
        }
      }
      @media (max-width: 400px) {
        .nav-center a {
          font-size: 0.8rem;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="index.html" class="nav-logo"
        >Mus <span style="color: var(--green-dark)">Tech</span
        ><span class="dot"></span
      ></a>
      <div class="nav-center">
        <a
          href="index.html"
          onclick="sessionStorage.setItem('openModal', 'login-modal')">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <span>Connexion</span>
        </a>
        <a
          href="index.html"
          onclick="sessionStorage.setItem('openModal', 'my-orders')">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round">
            <path
              d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
          </svg>
          <span>Mes Commandes</span>
        </a>
        <a
          href="index.html"
          onclick="sessionStorage.setItem('goPage', 'favorites')">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round">
            <path
              d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
          </svg>
          <span>Favoris</span>
        </a>
      </div>
      <div class="nav-actions">
        <button class="icon-btn" id="fav-btn" title="Ajouter aux favoris">
          <svg
            width="17"
            height="17"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round">
            <path
              d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
          </svg>
        </button>
        <button class="back-btn" onclick="window.location.href = 'index.html'">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12" />
            <polyline points="12 19 5 12 12 5" />
          </svg>
          Retour
        </button>
      </div>
    </nav>

    <div class="page">
      <div class="card" id="main-card">
        <!-- LEFT: IMAGE -->
        <div class="img-section">
          <div class="img-wrap" id="img-wrap">
            <!-- Skeleton -->
            <div
              class="skel"
              style="width: 100%; height: 100%; border-radius: 16px"
              id="img-skeleton"></div>
            <img id="main-img" src="" alt="Produit" style="display: none" />
          </div>
          <div class="thumbs" id="thumbs-container"></div>
        </div>

        <!-- RIGHT: INFO & FORM -->
        <div class="info" id="info-panel">
          <!-- Skeleton state -->
          <div id="skeleton-content">
            <div
              class="skel"
              style="width: 60px; height: 12px; margin-bottom: 10px"></div>
            <div
              class="skel"
              style="width: 80%; height: 28px; margin-bottom: 8px"></div>
            <div
              class="skel"
              style="width: 100%; height: 12px; margin-bottom: 6px"></div>
            <div
              class="skel"
              style="width: 90%; height: 12px; margin-bottom: 6px"></div>
            <div
              class="skel"
              style="width: 70%; height: 12px; margin-bottom: 24px"></div>
            <div
              class="skel"
              style="
                width: 100%;
                height: 70px;
                border-radius: 12px;
                margin-bottom: 12px;
              "></div>
            <div
              class="skel"
              style="
                width: 100%;
                height: 70px;
                border-radius: 12px;
                margin-bottom: 20px;
              "></div>
            <div
              class="skel"
              style="
                width: 40%;
                height: 36px;
                margin-bottom: 24px;
                border-radius: 8px;
              "></div>
            <div
              class="skel"
              style="width: 100%; height: 48px; border-radius: 50px"></div>
          </div>

          <!-- Real content (hidden until loaded) -->
          <div id="real-content" style="display: none">
            <div class="cat-label" id="product-category"></div>
            <h1 class="pname" id="product-name"></h1>
            <p class="desc" id="product-desc"></p>

            <div style="margin-bottom: 1.25rem">
              <h3
                style="
                  font-size: 0.85rem;
                  font-weight: 700;
                  margin-bottom: 0.85rem;
                  color: var(--gray-900);
                  display: flex;
                  align-items: center;
                  gap: 0.4rem;
                ">
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round">
                  <path
                    d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                </svg>
                Options & Quantités
              </h3>
              <div id="variants-rows-container"></div>
            </div>

            <div class="price-section">
              <div style="display: flex; align-items: baseline; gap: 0.5rem">
                <span class="price-val" id="product-price">0 DA</span>
                <span
                  class="price-old"
                  id="old-price"
                  style="display: none"></span>
              </div>
            </div>

            <div class="livraison-info" id="livraison-section">
              <div class="lv-row">
                <span class="lv-label">
                  <svg
                    width="14"
                    height="14"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect x="1" y="3" width="15" height="13" />
                    <polygon points="16 8 20 8 23 11 23 16 16 16 16 8" />
                    <circle cx="5.5" cy="18.5" r="2.5" />
                    <circle cx="18.5" cy="18.5" r="2.5" />
                  </svg>
                  Livraison
                </span>
                <span class="lv-price" id="livraison-prix-display">0 DA</span>
              </div>
              <div class="lv-sub">À Domicile</div>
            </div>

            <!-- CHECKOUT FORM -->
            <div class="checkout-section" id="checkout-form">
              <div style="margin-bottom: 1.25rem">
                <h3
                  style="
                    font-size: 0.8rem;
                    font-weight: 700;
                    color: var(--gray-500);
                    margin-bottom: 0.85rem;
                    text-transform: uppercase;
                    letter-spacing: 0.06em;
                    display: flex;
                    align-items: center;
                    gap: 0.4rem;
                  ">
                  <svg
                    width="13"
                    height="13"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round">

        sel.addEventListener("change", updateOrderSummaryFromCart);

      async function loadProduct() {
        const params = new URLSearchParams(window.location.search);
        const id = parseInt(params.get("id"));
        if (!id) {
          showToast("Produit introuvable");
          return;
        }

        // Load data
        try {
          const [products, wilayas] = await Promise.allSettled([
            ProductsAPI.getAll(),
            WilayasAPI.getAll(),
          ]);

          const productList =
            products.status === "fulfilled" ? products.value : [];
          const wilayaList =
            wilayas.status === "fulfilled" && wilayas.value?.length > 0
              ? wilayas.value
              : WILAYAS_58;

          const raw = productList.find((p) => p.id === id);
          if (!raw) {
            showToast("Produit introuvable");
            return;
          }

          product = {
            ...raw,
            cat: raw.cat || raw.category || "",
            desc: raw.desc || raw.description || "",
            img: raw.img || raw.image || "",
            images:
              raw.images ||
              (raw.img ? [raw.img] : raw.image ? [raw.image] : []),
            variants: raw.variants || ["Standard"],
            variantPrices: raw.variantPrices ||
              raw.variant_prices || [raw.price || 0],
          };
          if (typeof product.variantPrices === "string") {
            try {
              product.variantPrices = JSON.parse(product.variantPrices);
            } catch (e) {
              product.variantPrices = [product.price || 0];
            }
          }
          if (typeof product.variants === "string") {
            try {
              product.variants = JSON.parse(product.variants);
            } catch (e) {
              product.variants = ["Standard"];
            }
          }

          buildWilayaSelect(wilayaList);
          renderProduct();
          updateFavBtn();
          updateOrderSummaryFromCart();
          updateDeliveryDetails();

          // Show real content, hide skeleton
          document.getElementById("skeleton-content").style.display = "none";
          document.getElementById("real-content").style.display = "block";
          document.getElementById("img-skeleton").style.display = "none";
        } catch (e) {
          console.error(e);
          showToast("Erreur de chargement");
          buildWilayaSelect(WILAYAS_58);
        }
      }

      function renderProduct() {
        if (!product) return;
        document.title = product.name + " — Mus Tech";
        document.getElementById("product-category").textContent =
          product.cat || "Catégorie";
        document.getElementById("product-name").textContent = product.name;
        document.getElementById("product-desc").textContent =
          product.desc || product.description || "";

        // Image
        const mainImgEl = document.getElementById("main-img");
        const firstImg =
          product.images?.length > 0 ? product.images[0] : product.img || "";
        if (firstImg) {
          mainImgEl.src = firstImg;
          mainImgEl.style.display = "block";
          mainImgEl.onload = () => {
            document.getElementById("img-skeleton").style.display = "none";
          };
        } else {
          document.getElementById("img-skeleton").style.display = "none";
          const imgWrap = document.getElementById("img-wrap");
          const placeholder = document.createElement("div");
          placeholder.className = "img-placeholder";
          placeholder.innerHTML = `<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;
          imgWrap.appendChild(placeholder);
        }

        // Thumbnails
        const allImages =
          product.images?.length > 0
            ? product.images
            : product.img
              ? [product.img]
              : [];
        const thumbsContainer = document.getElementById("thumbs-container");
        thumbsContainer.innerHTML =
          allImages.length > 1
            ? allImages
                .map(
                  (img, i) =>
                    `<img class="thumb ${i === 0 ? "active" : ""}" src="${img}" onclick="changeImage(${i})">`,
                )
                .join("")
            : "";

        // Variants — NO stock
        const varContainer = document.getElementById("variants-rows-container");
        variantQtys = new Array(product.variants.length).fill(0);
        varContainer.innerHTML = product.variants
          .map((v, i) => {
            const price = product.variantPrices[i] ?? product.variantPrices[0];
            return `
            <div class="variant-row">
              <div>
                <div class="variant-name">${v}</div>
                <div class="variant-price">${price.toLocaleString()} DA</div>
              </div>
              <div class="qty-ctrl">
                <button class="qty-btn" onclick="changeVariantQty(${i},-1)">−</button>
                <input class="qty-input" type="number" value="0" data-variant="${i}" readonly>
                <button class="qty-btn" onclick="changeVariantQty(${i},1)">+</button>
              </div>
            </div>`;
          })
          .join("");

        updateTotalPrice();
      }

      function changeVariantQty(idx, delta) {
        variantQtys[idx] = Math.max(0, variantQtys[idx] + delta);
        document.querySelector(`input[data-variant="${idx}"]`).value =
          variantQtys[idx];
        updateTotalPrice();
      }

      function updateTotalPrice() {
        let total = 0;
        if (product) {
          product.variants.forEach((v, i) => {
            total +=
              (product.variantPrices[i] ?? product.variantPrices[0]) *
              variantQtys[i];
          });
        }
        document.getElementById("product-price").textContent =
          (total > 0
            ? total
            : product?.variantPrices[0] || 0
          ).toLocaleString() + " DA";
        updateOrderSummaryFromCart();
      }

      function changeImage(idx) {
        const allImages =
          product.images?.length > 0

        if (allImages[idx]) {
          document.getElementById("main-img").src = allImages[idx];
          document
            .querySelectorAll(".thumb")
            .forEach((el, i) => el.classList.toggle("active", i === idx));

        } else {
          favoriteProducts.push({

            name: product.name,
            image: product.img || "",

        localStorage.setItem("mt_favorites", JSON.stringify(favoriteProducts));
        updateFavBtn();

        btn.onclick = toggleFavorite;

        if (svg) svg.setAttribute("fill", isFav ? "currentColor" : "none");

      function updateOrderSummaryFromCart() {
        const summary = document.getElementById("order-summary-mini");
        if (!summary) return;
        const sel = document.getElementById("co-wilaya");
        const shipping = sel ? parseInt(sel.value) || 0 : 0;
        const wilayaName =
          sel && sel.selectedIndex > 0
            ? sel.options[sel.selectedIndex].dataset.name
            : "—";
        const typeLabel =
          deliveryType === "bureau" ? "Au Bureau" : "À Domicile";

        let itemsHtml = "";
        let subtotal = 0;
        if (product && variantQtys) {
          product.variants.forEach((variant, idx) => {
            const qty = variantQtys[idx];
            if (qty > 0) {
              const price =
                product.variantPrices[idx] ?? product.variantPrices[0];
              const itemTotal = price * qty;
              subtotal += itemTotal;
              itemsHtml += `<div class="orow"><span>${product.name} (${variant}) ×${qty}</span><span>${itemTotal.toLocaleString()} DA</span></div>`;
            }
          });
        }
        if (!itemsHtml)
          itemsHtml = `<div class="orow" style="color:var(--gray-400);">Aucun produit sélectionné</div>`;

        summary.innerHTML =
          itemsHtml +
          `<div class="orow"><span>Livraison ${typeLabel} (${wilayaName})</span><span>${shipping ? shipping.toLocaleString() + " DA" : "—"}</span></div>
           <div class="orow total"><span>Total</span><span>${(subtotal + shipping).toLocaleString()} DA</span></div>`;

        const livraisonSection = document.getElementById("livraison-section");
        if (livraisonSection && shipping > 0) {
          livraisonSection.style.display = "block";
          document.getElementById("livraison-prix-display").textContent =
            shipping.toLocaleString() + " DA";
        }
      }

      async function placeOrder() {
        const name = document.getElementById("co-name").value.trim();
        const phone = document.getElementById("co-phone").value.trim();
        const wilEl = document.getElementById("co-wilaya");
        const wilaya = wilEl.options[wilEl.selectedIndex]?.dataset.name || "";

        if (!phone || !wilaya) {
          showToast("Téléphone et Wilaya sont obligatoires");
          return;
        }

        let address = "";
        if (deliveryType === "bureau") {
          const compEl = document.getElementById("co-company");
          const offEl = document.getElementById("co-office");
          const company = compEl?.options[compEl.selectedIndex]?.text || "";
          const office = offEl?.value || "";
          if (!company || !office) {
            showToast("Choisissez la société et le bureau");
            return;
          }
          address = "Bureau — " + company + " — " + office;
        } else {
          address =
            "Domicile — " +
            (document.getElementById("co-address")?.value.trim() || "—");
        }

        const hasSelected = variantQtys?.some((q) => q > 0);
        const itemsToOrder = hasSelected
          ? variantQtys
              .map((qty, i) => ({ id: product.id, variant: i, qty }))
              .filter((item) => item.qty > 0)
          : [
              {
                id: product.id,
                variant: currentVariant,
                qty: Math.max(1, currentQty),
              },
            ];

        const orderData = {
          customer: name || phone,
          phone,
          wilaya,
          address,
          note: document.getElementById("co-note").value.trim(),
          items: itemsToOrder,
        };

        const btn = document.getElementById("confirm-btn");
        btn.disabled = true;
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 0.8s linear infinite"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Traitement...`;

        try {
          const result = await OrdersAPI.place(orderData);
          document.getElementById("checkout-form").style.display = "none";
          const box = document.getElementById("success-box");
          box.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:center;width:60px;height:60px;background:var(--green);border-radius:50%;margin:0 auto 1.25rem;">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <h2 style="color:var(--green-dark);font-size:1.4rem;font-weight:900;margin-bottom:0.5rem;">Commande Confirmée</h2>
            <p style="color:var(--gray-500);font-size:0.88rem;margin-bottom:0.75rem;">Merci <strong style="color:var(--gray-900);">${orderData.customer}</strong> — nous vous contacterons au <strong style="color:var(--gray-900);">${phone}</strong>.</p>
            <div class="success-ref-badge">
              <span style="font-weight:900;color:var(--green-dark);font-size:1rem;">${result.order_ref || "#MT-" + result.id}</span>
            </div>
            <p style="font-size:0.78rem;color:var(--gray-400);margin-top:0.5rem;margin-bottom:1.5rem;">${address}</p>
            <a href="index.html" style="display:inline-flex;align-items:center;gap:0.5rem;padding:0.75rem 1.75rem;background:var(--green);color:#fff;border-radius:50px;font-weight:700;text-decoration:none;font-size:0.9rem;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
              Retour à la boutique
            </a>
          `;
          box.classList.add("show");
          box.scrollIntoView({ behavior: "smooth", block: "center" });
        } catch (e) {
          showToast("Erreur : " + e.message);
          btn.disabled = false;
          btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Confirmer la Commande`;
        }
      }

      // Spin animation for loading button
      const style = document.createElement("style");
      style.textContent =
        "@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}";
      document.head.appendChild(style);

      loadProduct();
    </script>
  </body>
</html>
